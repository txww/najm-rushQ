# ─── najmrush.com — Next.js ───────────────────────────────────────────────────

# Redirect HTTP → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name najmrush.com www.najmrush.com;
    return 301 https://najmrush.com$request_uri;
}

# Redirect www → non-www
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.najmrush.com;

    ssl_certificate     /etc/letsencrypt/live/najmrush.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/najmrush.com/privkey.pem;

    return 301 https://najmrush.com$request_uri;
}

# Main Next.js app
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name najmrush.com;

    ssl_certificate     /etc/letsencrypt/live/najmrush.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/najmrush.com/privkey.pem;

    # SSL hardening
    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache         shared:SSL:10m;
    ssl_session_timeout       1d;
    ssl_stapling              on;
    ssl_stapling_verify       on;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;

    # Upload limit (for images)
    client_max_body_size 50M;

    # Logs
    access_log /var/log/nginx/najmrush-access.log;
    error_log  /var/log/nginx/najmrush-error.log;

    # Serve uploaded images directly from disk (faster, bypasses Node)
    location /uploads/ {
        alias /var/www/najmrush/najm-next-backend/public/uploads/;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Next.js static assets — long cache
    location /_next/static/ {
        proxy_pass         http://localhost:3000/_next/static/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        expires            1y;
        add_header         Cache-Control "public, immutable";
        access_log         off;
    }

    # All other requests → Next.js
    location / {
        proxy_pass         http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        'upgrade';
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
    }
}

# ─── cms.najmrush.com — Strapi ────────────────────────────────────────────────

server {
    listen 80;
    listen [::]:80;
    server_name cms.najmrush.com;
    return 301 https://cms.najmrush.com$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name cms.najmrush.com;

    ssl_certificate     /etc/letsencrypt/live/cms.najmrush.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/cms.najmrush.com/privkey.pem;

    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache         shared:SSL:10m;
    ssl_session_timeout       1d;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;

    client_max_body_size 100M;

    access_log /var/log/nginx/strapi-access.log;
    error_log  /var/log/nginx/strapi-error.log;

    location / {
        proxy_pass         http://localhost:1337;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade             $http_upgrade;
        proxy_set_header   Connection          'upgrade';
        proxy_set_header   Host                $host;
        proxy_set_header   X-Real-IP           $remote_addr;
        proxy_set_header   X-Forwarded-Host    $host;
        proxy_set_header   X-Forwarded-Server  $host;
        proxy_set_header   X-Forwarded-For     $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto   $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
    }
}
