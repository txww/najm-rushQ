version: '3.8'

services:
  najm-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: najm-next-app
    ports:
      - '3000:3000'
    environment:
      - NODE_ENV=production
      - SITE_URL=https://najm-rush.com
      - NEXT_PUBLIC_API_BASE_URL=https://najm-rush.com
    volumes:
      - ./dev.db:/app/dev.db
      - ./public/uploads:/app/public/uploads
    networks:
      - najm-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/test"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  najm-network:
    driver: bridge

volumes:
  db-data:
  uploads-data:
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    networks:
      - najm-network
    restart: unless-stopped

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: najm_db
      POSTGRES_USER: najm_user
      POSTGRES_PASSWORD: najm_password
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - najm-network
    restart: unless-stopped

  # Optional: Add a backend API service
  # api:
  #   image: your-api-image
  #   ports:
  #     - "5000:5000"
  #   environment:
  #     - NODE_ENV=production
  #   restart: unless-stopped

volumes:
  redis_data:
  postgres_data:

networks:
  najm-network:
    driver: bridge
