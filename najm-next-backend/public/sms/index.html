<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سيرفر رسائل أبراج سوريا - الاحترافي</title>
    <style>
        :root { --gold: #d4af37; --bg: #121212; --card: #1e1e1e; --neon: #39FF14; --green: #007a3d; --error: #ff4d4d; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); color: white; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 10px; }
        .container { width: 100%; max-width: 450px; background: var(--card); border-radius: 15px; border: 1px solid var(--gold); overflow: hidden; box-shadow: 0 15px 35px rgba(0,0,0,0.7); transition: all 0.3s ease; }
        .hidden { display: none !important; }
        .header { background: linear-gradient(135deg, var(--green), #004d26); padding: 25px; text-align: center; border-bottom: 2px solid var(--gold); }
        .header h2 { margin: 0; color: white; letter-spacing: 1px; text-shadow: 1px 1px 3px rgba(0,0,0,0.5); }
        .sidebar { background: #252525; padding: 12px 20px; border-bottom: 1px solid var(--gold); display: flex; justify-content: space-between; align-items: center; font-size: 14px; }
        .user-tag { background: var(--gold); color: black; padding: 3px 12px; border-radius: 20px; font-weight: 700; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        .content { padding: 25px; text-align: center; }
        input, select, textarea, button { width: 100%; padding: 14px; margin-bottom: 15px; border-radius: 10px; border: 1px solid #444; background: rgba(0,0,0,0.4); color: white; box-sizing: border-box; font-size: 14px; transition: 0.2s; }
        input:focus, textarea:focus { border-color: var(--gold); background: rgba(0,0,0,0.6); outline: none; box-shadow: 0 0 8px rgba(212, 175, 55, 0.3); }
        button { background: linear-gradient(45deg, var(--gold), #b38f2d); color: black; font-weight: bold; cursor: pointer; border: none; font-size: 15px; text-transform: uppercase; }
        button:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(212, 175, 55, 0.4); }
        button:active { transform: translateY(0); }
        button:disabled { background: #444; color: #888; cursor: not-allowed; }
        label { display: block; text-align: right; margin-bottom: 6px; font-size: 13px; color: var(--gold); font-weight: 600; }
        .neon-note { color: var(--neon); font-size: 12px; font-weight: bold; margin-bottom: 15px; text-align: right; border: 1px dashed var(--neon); padding: 12px; border-radius: 8px; line-height: 1.6; background: rgba(57, 255, 20, 0.05); }
        .switch-link { color: var(--gold); cursor: pointer; text-decoration: none; font-size: 13px; margin: 0 8px; border-bottom: 1px solid transparent; transition: 0.2s; }
        .switch-link:hover { border-bottom: 1px solid var(--gold); }
        .sms-info { background: rgba(255,255,255,0.03); padding: 10px; border-radius: 8px; font-size: 13px; margin-top: -10px; margin-bottom: 15px; display: flex; justify-content: space-between; border: 1px solid #333; }
        #status { font-size: 13px; margin-top: 10px; color: var(--gold); min-height: 1.2em; }
    </style>
</head>
<body>

<div id="loginSection" class="container">
    <div class="header"><h2>سيرفر أبراج سوريا</h2></div>
    <div class="content">
        <input type="tel" id="loginPhone" placeholder="رقم الهاتف (9639...)">
        <input type="password" id="loginPass" placeholder="كلمة المرور">
        <button id="loginBtn" onclick="App.login()">دخول آمن</button>
        <div style="margin-top:10px;">
            <span class="switch-link" onclick="App.showView('regSection')">عضوية جديدة</span>
            <span style="color:#444">|</span>
            <span class="switch-link" onclick="App.showView('forgotSection')">فقدت كلمة السر؟</span>
        </div>
    </div>
</div>

<div id="regSection" class="container hidden">
    <div class="header"><h2>إنشاء حساب</h2></div>
    <div class="content">
        <input type="text" id="regName" placeholder="الاسم الكامل">
        <input type="tel" id="regPhone" placeholder="9639xxxxxxxx">
        <input type="password" id="regPass" placeholder="كلمة المرور">
        <button onclick="App.sendRegOTP()">إرسال كود التحقق</button>
        <p><span class="switch-link" onclick="App.showView('loginSection')">العودة لتسجيل الدخول</span></p>
    </div>
</div>

<div id="otpSection" class="container hidden">
    <div class="header"><h2>تأكيد الهوية</h2></div>
    <div class="content">
        <input type="text" id="otpInput" placeholder="كود التفعيل (4 أرقام)" maxlength="4">
        <button onclick="App.verifyAndRegister()">تفعيل الحساب الآن</button>
    </div>
</div>

<div id="mainApp" class="container hidden">
    <div class="sidebar">
        <div>المستخدم: <span id="displayName" class="user-tag">..</span></div>
        <div>الرصيد: <b id="displayLimit" style="color:var(--gold);">0</b></div>
    </div>
    <div class="content">
        <div class="neon-note">⚠️ التنسيق الدولي مطلوب: 963XXXXXXXXX<br>يرجى التأكد من الأرقام قبل الإرسال الجماعي.</div>
        
        <label>بوابة الإرسال (Sender ID):</label>
        <select id="sid">
            <option value="Amgad-sms">Amgad-sms (شامل)</option>
            <option value="ciedco-sms">ciedco-sms (فردي)</option>
            <option value="ciedco2sms">ciedco2sms (جماعي)</option>
            <option value="Najm-Rush">Najm-Rush (شامل)</option>
        </select>

        <label>قائمة الأرقام (رقم في كل سطر):</label>
        <textarea id="mno" rows="4" placeholder="9639xxxxxxxx"></textarea>

        <label>محتوى الرسالة:</label>
        <textarea id="msg" rows="3" placeholder="اكتب نصك هنا..." oninput="App.updateSmsInfo()"></textarea>

        <div class="sms-info">
            <span>الحروف: <b id="charCount">0</b></span>
            <span>الأجزاء: <b id="segCount">1</b></span>
        </div>

        <button id="sendBtn" onclick="App.startBulkSend()">إطلاق الحملة الآن</button>
        <div id="status"></div>
    </div>
</div>

<script>
/** * نظام الإرسال المطور - حماية واحترافية
 * تم تجميع الكود في Object واحد لتجنب تداخل المتغيرات (Global Scope)
 */
const App = {
    API_URL: '/sms-api',
    user: { phone: '', name: '', limit: 0 },
    isSending: false,

    showView(id) {
        document.querySelectorAll('.container').forEach(c => c.classList.add('hidden'));
        document.getElementById(id).classList.remove('hidden');
    },

    // دالة الاتصال الموحدة مع معالجة الأخطاء
    async request(endpoint, data) {
        try {
            const res = await fetch(`${this.API_URL}/${endpoint}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
            return await res.json();
        } catch (e) {
            console.error("Connection Error", e);
            return { error: 'تعذر الاتصال بالسيرفر' };
        }
    },

    updateSmsInfo() {
        const text = document.getElementById('msg').value;
        const len = text.length;
        // الاحتساب الدقيق للرسائل العربية (70 حرف للرسالة الأولى، ثم 67 حرف لكل جزء)
        const segs = len <= 70 ? (len === 0 ? 0 : 1) : Math.ceil(len / 67);
        document.getElementById('charCount').innerText = len;
        document.getElementById('segCount').innerText = segs || 1;
    },

    async login() {
        const phone = document.getElementById('loginPhone').value.trim();
        const pass = document.getElementById('loginPass').value;
        if (!phone || !pass) return alert('يرجى ملء كافة الحقول');

        const btn = document.getElementById('loginBtn');
        btn.disabled = true;
        btn.innerText = 'جاري التحقق...';

        const d = await this.request('login', { phone, pass });
        if (d.ok) {
            this.user = { phone, name: d.name, limit: d.limit };
            document.getElementById('displayName').innerText = this.user.name;
            document.getElementById('displayLimit').innerText = this.user.limit;
            this.showView('mainApp');
        } else {
            alert(d.error || 'خطأ في بيانات الدخول');
        }
        btn.disabled = false;
        btn.innerText = 'دخول آمن';
    },

    // --- نظام الإرسال الذكي ---
    async startBulkSend() {
        if (this.isSending) return;
        
        const msg = document.getElementById('msg').value.trim();
        const sid = document.getElementById('sid').value;
        const rawNums = document.getElementById('mno').value.split(/\r?\n/);
        const nums = rawNums.map(n => n.trim()).filter(n => n.length === 12);
        
        const segs = document.getElementById('msg').value.length <= 70 ? 1 : Math.ceil(document.getElementById('msg').value.length / 67);
        const totalNeeded = nums.length * segs;

        if (!nums.length || !msg) return alert('تحقق من الأرقام والرسالة');
        if (totalNeeded > this.user.limit) return alert(`رصيدك غير كافٍ. تحتاج ${totalNeeded} نقطة.`);

        if (!confirm(`هل أنت متأكد من إرسال ${nums.length} رسالة؟`)) return;

        this.isSending = true;
        const btn = document.getElementById('sendBtn');
        const st = document.getElementById('status');
        btn.disabled = true;

        let successCount = 0;

        for (let i = 0; i < nums.length; i++) {
            st.innerHTML = `جاري معالجة: (${i + 1}/${nums.length})`;
            
            const res = await this.request('send-sms', { 
                phone: this.user.phone, 
                mno: nums[i], 
                msg: msg, 
                sid: sid 
            });

            // تحسين الأمان: تحديث الرصيد من رد السيرفر الرسمي فقط
            if (res.ok || (res.result && String(res.result).includes('OK'))) {
                successCount++;
                // تحديث الرصيد في الواجهة بناءً على ما يعيده السيرفر (أكثر أماناً)
                if (res.newLimit !== undefined) {
                    this.user.limit = res.newLimit;
                } else {
                    this.user.limit -= segs;
                }
                document.getElementById('displayLimit').innerText = this.user.limit;
            }
            
            // تأخير بسيط لمنع الحظر
            await new Promise(r => setTimeout(r, 600));
        }

        // تقرير الختام
        await this.request('notify', { 
            text: `✅ اكتملت الحملة\nالمستخدم: ${this.user.name}\nالناجح: ${successCount}\nالرصيد الحالي: ${this.user.limit}` 
        });

        alert(`اكتمل الإرسال! نجح: ${successCount}`);
        st.innerText = 'تم إنهاء العملية بنجاح';
        btn.disabled = false;
        this.isSending = false;
    },

    // الدوال المساعدة للـ OTP (مختصرة للاحترافية)
    async sendRegOTP() {
        const phone = document.getElementById('regPhone').value.trim();
        const name = document.getElementById('regName').value.trim();
        const pass = document.getElementById('regPass').value;
        if (phone.length !== 12 || !name) return alert('بيانات غير صالحة');
        
        const d = await this.request('send-reg-otp', { phone, name, pass });
        if (!d.error) { this.user.phone = phone; this.showView('otpSection'); }
        else alert(d.error);
    },

    async verifyAndRegister() {
        const otp = document.getElementById('otpInput').value.trim();
        const d = await this.request('verify-register', { phone: this.user.phone, otp });
        if (d.ok) { alert('تم التفعيل! يمكنك الدخول الآن.'); this.showView('loginSection'); }
        else alert(d.error);
    }
};
</script>
</body>
</html>
