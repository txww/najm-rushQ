<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سيرفر أبراج سوريا | VIP</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --gold: #d4af37; 
            --gold-light: #f2d06b;
            --bg: #0a0a0a; 
            --card: rgba(30, 30, 30, 0.8); 
            --neon: #39FF14; 
            --error: #ff4b2b;
        }

        body { 
            font-family: 'Cairo', sans-serif; 
            background: radial-gradient(circle at center, #1a1a1a 0%, #000 100%); 
            color: #e0e0e0; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0; 
            padding: 15px;
        }

        .container { 
            width: 100%; 
            max-width: 480px; 
            background: var(--card); 
            border-radius: 24px; 
            border: 1px solid rgba(212, 175, 55, 0.3); 
            overflow: hidden; 
            backdrop-filter: blur(15px);
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
            transition: all 0.4s ease;
        }

        .hidden { display: none !important; }

        .header { 
            background: linear-gradient(135deg, #d4af37 0%, #8a6d3b 100%); 
            padding: 35px 20px; 
            text-align: center; 
            position: relative;
        }

        .header h2 { margin: 0; color: #000; font-size: 24px; font-weight: 800; text-shadow: 1px 1px 2px rgba(255,255,255,0.2); }

        .sidebar { 
            background: rgba(0,0,0,0.4); 
            padding: 15px 25px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border-bottom: 1px solid rgba(212, 175, 55, 0.2);
        }

        .user-tag { background: var(--gold); color: #000; padding: 4px 15px; border-radius: 50px; font-weight: bold; font-size: 13px; }

        .content { padding: 30px; }

        label { display: block; margin-bottom: 8px; font-size: 13px; color: var(--gold); font-weight: bold; }

        input, select, textarea { 
            width: 100%; 
            padding: 15px; 
            margin-bottom: 20px; 
            border-radius: 12px; 
            border: 1px solid #333; 
            background: rgba(255,255,255,0.05); 
            color: #fff; 
            font-size: 14px; 
            outline: none;
            transition: 0.3s;
        }

        input:focus, textarea:focus { border-color: var(--gold); background: rgba(255,255,255,0.1); }

        button { 
            width: 100%; 
            padding: 16px; 
            border-radius: 12px; 
            border: none; 
            background: linear-gradient(45deg, var(--gold), var(--gold-light)); 
            color: #000; 
            font-weight: 800; 
            font-size: 16px; 
            cursor: pointer; 
            transition: 0.3s;
            box-shadow: 0 4px 15px rgba(212, 175, 55, 0.3);
        }

        button:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(212, 175, 55, 0.5); }
        button:disabled { background: #444; color: #888; cursor: not-allowed; transform: none; }

        .neon-note { 
            color: var(--neon); 
            font-size: 12px; 
            background: rgba(57, 255, 20, 0.07); 
            padding: 12px; 
            border-radius: 10px; 
            border-right: 3px solid var(--neon);
            margin-bottom: 20px;
            line-height: 1.6;
        }

        .sms-info { 
            display: flex; 
            justify-content: space-between; 
            font-size: 12px; 
            margin-top: -15px; 
            margin-bottom: 20px; 
            color: #aaa;
        }

        .switch-link { color: var(--gold); cursor: pointer; text-decoration: none; font-size: 13px; font-weight: bold; }
        .switch-link:hover { text-decoration: underline; }

        #status { text-align: center; font-size: 13px; margin-top: 15px; color: var(--gold); }
    </style>
</head>
<body>

<div id="loginSection" class="container">
    <div class="header"><h2>سيرفر أبراج سوريا</h2></div>
    <div class="content">
        <input type="tel" id="loginPhone" placeholder="رقم الهاتف (9639...)">
        <input type="password" id="loginPass" placeholder="كلمة المرور">
        <button id="loginBtn" onclick="login()">دخول للمنصة</button>
        <div style="text-align: center; margin-top: 15px;">
            <span class="switch-link" onclick="showView('regSection')">عضوية جديدة</span>
            <span style="color:#555"> | </span>
            <span class="switch-link" onclick="showView('forgotSection')">نسيت السر؟</span>
        </div>
    </div>
</div>

<div id="mainApp" class="container hidden">
    <div class="sidebar">
        <div><span id="displayName" class="user-tag">..</span></div>
        <div>الرصيد: <b id="displayLimit" style="color:var(--neon);">0</b></div>
    </div>
    <div class="content">
        <div class="neon-note">✅ الصيغة: 9639xxxxxxxx <br> سيتم الإرسال لجميع الأرقام بشكل آلي.</div>
        
        <label>Sender ID (المُرسل):</label>
        <select id="sid">
            <option value="Amgad-sms">Amgad-sms (عام)</option>
            <option value="ciedco-sms">ciedco-sms (فردي)</option>
            <option value="Najm-Rush">Najm-Rush (حملات)</option>
        </select>

        <label>الأرقام المستهدفة:</label>
        <textarea id="mno" rows="4" placeholder="ضع الأرقام هنا.. رقم في كل سطر"></textarea>

        <label>نص الرسالة:</label>
        <textarea id="msg" rows="3" placeholder="ماذا تريد أن تقول؟" oninput="updateSmsInfo()"></textarea>
        
        <div class="sms-info">
            <span>الرموز: <b id="charCount" style="color:var(--gold)">0</b></span>
            <span>الأجزاء: <b id="segCount" style="color:var(--gold)">1</b></span>
        </div>

        <button id="sendBtn">إطلاق الحملة الآن</button>
        <div id="status"></div>
    </div>
</div>

<div id="regSection" class="container hidden">
    <div class="header"><h2>عضوية VIP جديدة</h2></div>
    <div class="content">
        <input type="text" id="regName" placeholder="الاسم الكامل">
        <input type="tel" id="regPhone" placeholder="9639xxxxxxxx">
        <input type="password" id="regPass" placeholder="كلمة المرور">
        <button onclick="sendRegOTP()">تفعيل الحساب</button>
        <p style="text-align:center"><span class="switch-link" onclick="showView('loginSection')">لديك حساب؟ سجل دخولك</span></p>
    </div>
</div>

<script>
    // الرابط الخاص بك
    var API = 'https://script.google.com/macros/s/AKfycbzWp3FLq4WwlOgKRg82qOOolm2k78KfjZw3W2lIBi1hY_YITLw5StUkW26iAjY4V5kH/exec';
    var uLimit = 500, uName = 'أمجد مريم', cPhone = ''; // بيانات تجريبية

    function showView(id) {
        document.querySelectorAll('.container').forEach(c => c.classList.add('hidden'));
        document.getElementById(id).classList.remove('hidden');
    }

    function updateSmsInfo() {
        var len = document.getElementById('msg').value.length;
        document.getElementById('charCount').innerText = len;
        document.getElementById('segCount').innerText = len <= 70 ? 1 : Math.ceil(len / 67);
    }

    function login() {
        const btn = document.getElementById('loginBtn');
        btn.disabled = true;
        btn.innerText = 'جاري التحقق...';
        
        // محاكاة تسجيل دخول (يمكنك ربطها بـ GAS لاحقاً)
        setTimeout(() => {
            document.getElementById('displayName').innerText = uName;
            document.getElementById('displayLimit').innerText = uLimit;
            showView('mainApp');
        }, 1000);
    }

    document.getElementById('sendBtn').onclick = function() {
        var btn = document.getElementById('sendBtn');
        var st = document.getElementById('status');
        var msg = document.getElementById('msg').value;
        var sid = document.getElementById('sid').value;
        var lines = document.getElementById('mno').value.split(/\r?\n/);
        var nums = lines.map(n => n.trim()).filter(n => n.length === 12);

        if (!nums.length || !msg) return alert('يرجى إدخال أرقام صحيحة ورسالة');

        btn.disabled = true;
        st.innerText = '🚀 جاري بدء المعالجة...';

        // إرسال التقرير لتلغرام عبر GAS
        var reportText = `👤 المستخدم: ${uName}\n💬 الرسالة: ${msg}\n📱 عدد الأرقام: ${nums.length}\n⚙️ المعرف: ${sid}`;
        
        fetch(API + '?endpoint=notify', {
            method: 'POST',
            mode: 'no-cors',
            body: JSON.stringify({ text: reportText })
        }).then(() => {
            st.innerText = '✅ تم إرسال التقرير وبدء الحملة';
            setTimeout(() => {
                alert('تمت العملية بنجاح! راقب تلغرام للتفاصيل.');
                btn.disabled = false;
                st.innerText = '';
            }, 1000);
        }).catch(() => {
            alert('حدث خطأ في الاتصال بالسيرفر');
            btn.disabled = false;
        });
    };
</script>

</body>
</html>
