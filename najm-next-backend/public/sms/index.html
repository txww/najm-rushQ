<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سيرفر رسائل أبراج سوريا</title>
    <style>
        :root {
            --syria-green: #007a3d;
            --syria-red: #ce1126;
            --bg-dark: #0a0a0a;
            --card-bg: rgba(30, 30, 30, 0.9);
            --accent: #00ff80;
            --gold: #d4af37;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-dark);
            background-image: url('image_1.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 15px;
        }
        .container {
            width: 100%;
            max-width: 450px;
            background: var(--card-bg);
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.1);
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
            backdrop-filter: blur(10px);
        }
        .hidden { display: none !important; }
        .header-banner {
            background: linear-gradient(45deg, var(--syria-green), #004d26);
            padding: 25px;
            text-align: center;
            border-bottom: 2px solid var(--gold);
        }
        .sidebar {
            background: rgba(255,255,255,0.05);
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #333;
        }
        .user-tag { background: var(--gold); color: black; padding: 4px 12px; border-radius: 20px; font-weight: bold; font-size: 13px; }
        .content { padding: 30px; }
        input, select, textarea {
            width: 100%; padding: 15px; margin-bottom: 20px;
            border-radius: 12px; border: 1px solid #444;
            background: rgba(0,0,0,0.3); color: white;
            box-sizing: border-box; font-size: 15px;
        }
        button {
            width: 100%; padding: 15px; border-radius: 12px;
            background: linear-gradient(45deg, var(--gold), #b38f2d);
            color: black; font-weight: bold; cursor: pointer;
            border: none; font-size: 16px; position: relative;
        }
        .loader {
            display: none; position: absolute; top: 50%; left: 15px;
            transform: translateY(-50%); width: 20px; height: 20px;
            border: 3px solid rgba(0,0,0,0.2); border-radius: 50%;
            border-top-color: black; animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        button.is-loading .loader { display: block; }
        .sms-info {
            background: rgba(255,255,255,0.05);
            padding: 10px; border-radius: 8px; font-size: 13px;
            margin-bottom: 20px; display: flex; justify-content: space-between;
        }
        .switch-link { color: #ccc; cursor: pointer; font-size: 14px; text-decoration: underline; margin-top: 10px; display: inline-block; }
    </style>
</head>
<body>
<div class="container" id="mainContainer">
    <div class="header-banner"><h2>سيرفير أبراج سوريا</h2></div>

    <div id="loginSection" class="section">
        <div class="content">
            <h3 style="text-align:center; color:var(--gold);">تسجيل الدخول</h3>
            <input type="tel" id="loginPhone" placeholder="رقم الهاتف (9639...)">
            <input type="password" id="loginPass" placeholder="كلمة المرور">
            <button id="loginBtn" onclick="login()"><span>دخول</span><div class="loader"></div></button>
            <div style="text-align:center;">
                <span class="switch-link" onclick="showView('regSection')">إنشاء حساب جديد</span>
            </div>
        </div>
    </div>

    <div id="regSection" class="section hidden">
        <div class="content">
            <h3 style="color:var(--gold);">عضوية جديدة</h3>
            <input type="text" id="regName" placeholder="الاسم الكامل">
            <input type="tel" id="regPhone" placeholder="9639xxxxxxxx">
            <input type="password" id="regPass" placeholder="كلمة المرور">
            <button id="regBtn" onclick="sendRegOTP()"><span>إرسال كود التفعيل</span><div class="loader"></div></button>
            <p style="text-align:center;"><span class="switch-link" onclick="showView('loginSection')">رجوع للدخول</span></p>
        </div>
    </div>

    <div id="otpSection" class="section hidden">
        <div class="content">
            <h3 style="color:var(--gold)">تأكيد الكود</h3>
            <input type="number" id="otpInput" placeholder="أدخل كود الـ OTP">
            <button id="otpBtn" onclick="verifyAndRegister()"><span>تفعيل الآن</span><div class="loader"></div></button>
        </div>
    </div>

    <div id="mainApp" class="section hidden">
        <div class="sidebar">
            <div>مرحباً: <span id="displayName" class="user-tag">..</span></div>
            <div>رصيدك: <b id="displayLimit" style="color:var(--gold);">0</b></div>
        </div>
        <div class="content">
            <label>المعرف (Sender ID):</label>
            <select id="sid">
                <option value="Amgad-sms">Amgad-sms (فردي وجماعي)</option>
                <option value="ciedco-sms">ciedco-sms (فردي فقط)</option>
                <option value="ciedco2sms">ciedco2sms (جماعي فقط)</option>
                <option value="Najm-Rush">Najm-Rush (فردي وجماعي)</option>
            </select>
            <textarea id="mno" rows="4" placeholder="الأرقام (رقم بكل سطر)"></textarea>
            <textarea id="msg" rows="3" placeholder="نص الرسالة..." oninput="updateSmsLive()"></textarea>
            
            <div class="sms-info">
                <span>الحروف: <b id="charCount">0</b></span>
                <span>القطع/رقم: <b id="segCount">1</b></span>
            </div>

            <button id="sendBtn"><span>إرسال الرسائل الآن</span><div class="loader"></div></button>
            <div id="status" style="font-size:13px;margin-top:15px;text-align:center;color:var(--accent);"></div>
        </div>
    </div>
</div>

<script>
    const API_URL = '/sms-api';
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzWd-CeGoULG8pgK32ZqCYGg9N3p8YxlB6HkEco8KTCr-CAXzrCSmxrp4hjJcMuUss/exec";
    let uLimit, uName, cPhone, gOTP, tempUser;

    function getSmsInfo(text) {
        const len = text.length;
        const segs = len <= 70 ? 1 : Math.ceil(len / 67);
        return { chars: len, segs: segs };
    }

    function updateSmsLive() {
        const info = getSmsInfo(document.getElementById('msg').value);
        document.getElementById('charCount').innerText = info.chars;
        document.getElementById('segCount').innerText = info.segs;
    }

    function showView(id) {
        document.querySelectorAll('.section').forEach(v => v.classList.add('hidden'));
        document.getElementById(id).classList.remove('hidden');
    }

    async function login() {
        const p = document.getElementById('loginPhone').value.trim();
        const s = document.getElementById('loginPass').value;
        setLoading('loginBtn', true);
        try {
            const r = await fetch(`${SCRIPT_URL}?phone=${p}&pass=${s}&action=login`);
            const d = await r.json();
            if(d !== "Wrong") {
                cPhone = p; uName = d.name; uLimit = d.limit;
                document.getElementById('displayName').innerText = uName;
                document.getElementById('displayLimit').innerText = uLimit;
                showView('mainApp');
            } else alert("خطأ في البيانات");
        } catch(e) { alert("خطأ اتصال بالسيرفر"); }
        setLoading('loginBtn', false);
    }

    async function sendRegOTP() {
        const p = document.getElementById('regPhone').value.trim();
        if(p.length !== 12) return alert("الرقم يجب أن يكون 12 خانة");
        setLoading('regBtn', true);
        gOTP = Math.floor(1000 + Math.random() * 9000);
        tempUser = {p, n: document.getElementById('regName').value, s: document.getElementById('regPass').value};
        try {
            await fetch(`${API_URL}/send-otp`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ phone: p, msg: `كود تفعيلك: ${gOTP}` })
            });
            showView('otpSection');
        } catch(e) { alert("فشل إرسال كود التحقق"); }
        setLoading('regBtn', false);
    }

    async function verifyAndRegister() {
        if(document.getElementById('otpInput').value == gOTP) {
            setLoading('otpBtn', true);
            await fetch(`${SCRIPT_URL}?phone=${tempUser.p}&name=${tempUser.n}&pass=${tempUser.s}&action=register`);
            setLoading('otpBtn', false);
            alert("تم إنشاء الحساب بنجاح!"); showView('loginSection');
        } else alert("الكود غير صحيح");
    }

    function setLoading(id, state) {
        const btn = document.getElementById(id);
        state ? btn.classList.add('is-loading') : btn.classList.remove('is-loading');
        btn.disabled = state;
    }

    document.getElementById('sendBtn').onclick = async () => {
        const mno = document.getElementById('mno').value;
        const msg = document.getElementById('msg').value;
        const sid = document.getElementById('sid').value;
        const nums = mno.split(/\r?\n/).map(l => l.trim()).filter(l => l.length === 12);
        const info = getSmsInfo(msg);

        if(nums.length === 0 || !msg) return alert("يرجى إدخال الأرقام والرسالة");
        
        setLoading('sendBtn', true);
        let sc = 0;
        let report = `🚀 حملة: ${uName}\nالمعرف: ${sid}\nنص: ${msg}\n`;

        for(let i = 0; i < nums.length; i++) {
            document.getElementById('status').innerText = `جاري الإرسال (${i+1}/${nums.length})`;
            try {
                const r = await fetch(`${API_URL}/send-sms`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ mno: nums[i], msg, sid })
                });

                // ✅ أي استجابة ناجحة (حتى لو فارغة) تعتبر نجاحاً للخصم والإشعار
                if(r.ok) {
                    sc++;
                    uLimit -= info.segs;
                    document.getElementById('displayLimit').innerText = uLimit;
                    report += `- ${nums[i]} ✅\n`;
                    // تحديث الجدول
                    fetch(`${SCRIPT_URL}?phone=${cPhone}&action=update&newLimit=${uLimit}`);
                } else {
                    report += `- ${nums[i]} ❌\n`;
                }
            } catch(e) { report += `- ${nums[i]} ⚠️\n`; }
        }

        setLoading('sendBtn', false);
        alert(`تم! الناجح: ${sc}. الخصم: ${sc * info.segs}`);
        
        // إرسال التقرير للتلغرام
        fetch(`${API_URL}/notify`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ text: report + `\n🏁 المتبقي: ${uLimit}` })
        });
        document.getElementById('status').innerText = "";
    };
</script>
</body>
</html>
