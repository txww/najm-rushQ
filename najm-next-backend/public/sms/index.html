<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سيرفر أبراج سوريا - النسخة الملكية</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #d4af37; --bg: #0b0b0b; --card: #161616; --neon: #00ff88; --error: #ff4444; }
        body { font-family: 'Cairo', sans-serif; background: var(--bg); color: white; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 10px; }
        .container { width: 100%; max-width: 480px; background: var(--card); border-radius: 25px; border: 1px solid rgba(212, 175, 55, 0.2); overflow: hidden; box-shadow: 0 20px 60px rgba(0,0,0,0.9); position: relative; animation: fadeIn 0.8s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .hidden { display: none !important; }
        .header { background: linear-gradient(135deg, #007a3d, #002d16); padding: 30px; text-align: center; border-bottom: 4px solid var(--gold); }
        .header h2 { margin: 0; font-size: 24px; font-weight: 900; }
        .sidebar { background: #1f1f1f; padding: 15px 25px; border-bottom: 1px solid var(--gold); display: flex; justify-content: space-between; align-items: center; }
        .user-tag { background: var(--gold); color: #000; padding: 4px 15px; border-radius: 50px; font-weight: 900; font-size: 13px; }
        .content { padding: 30px; }
        input, select, textarea { width: 100%; padding: 16px; margin-bottom: 15px; border-radius: 15px; border: 1px solid #333; background: #0d0d0d; color: #fff; box-sizing: border-box; outline: none; transition: 0.3s; font-family: 'Cairo'; }
        button { width: 100%; padding: 18px; border-radius: 15px; border: none; background: linear-gradient(90deg, #d4af37, #f2d06b); color: #000; font-weight: 900; cursor: pointer; transition: 0.4s; font-size: 16px; }
        button:disabled { background: #444; color: #888; cursor: not-allowed; }
        .sms-info { background: rgba(255,255,255,0.03); padding: 15px; border-radius: 12px; font-size: 14px; margin-bottom: 15px; display: flex; justify-content: space-between; border: 1px solid #222; }
        .count-badge { color: var(--neon); font-weight: bold; }
        .warning-text { color: var(--error); font-size: 12px; font-weight: bold; display: none; margin-bottom: 10px; text-align: right; }
        .switch-link { color: var(--gold); cursor: pointer; font-weight: bold; font-size: 13px; margin: 10px; display: inline-block; }
    </style>
</head>
<body>

<div id="loginSection" class="container">
    <div class="header"><h2>سيرفر أبراج سوريا</h2></div>
    <div class="content">
        <input type="tel" id="loginPhone" placeholder="رقم الهاتف (9639...)">
        <input type="password" id="loginPass" placeholder="كلمة المرور">
        <button id="loginBtn" onclick="login()">دخول للمنصة</button>
        <div style="text-align:center; margin-top:15px;">
            <span class="switch-link" onclick="showView('regSection')">إنشاء حساب</span>
            <span class="switch-link" onclick="alert('تواصل مع الإدارة لاستعادة الحساب')">نسيت كلمة المرور؟</span>
        </div>
    </div>
</div>

<div id="regSection" class="container hidden">
    <div class="header"><h2>عضوية جديدة</h2></div>
    <div class="content">
        <input type="text" id="regName" placeholder="الاسم الكامل">
        <input type="tel" id="regPhone" placeholder="9639xxxxxxxx">
        <input type="password" id="regPass" placeholder="كلمة المرور">
        <button id="regBtn" onclick="register()">إرسال طلب تفعيل</button>
        <div style="text-align:center; margin-top:15px;"><span class="switch-link" onclick="showView('loginSection')">رجوع للدخول</span></div>
    </div>
</div>

<div id="mainApp" class="container hidden">
    <div class="sidebar">
        <div>👤 <span id="displayName" class="user-tag">..</span></div>
        <div>💰 الرصيد: <b id="displayLimit" style="color:var(--gold);">0</b></div>
    </div>
    <div class="content">
        <select id="sid">
            <option value="Amgad-sms">Amgad-sms</option>
            <option value="Najm-Rush">Najm-Rush</option>
            <option value="ciedco-sms">ciedco-sms</option>
            <option value="ciedco2sms">ciedco2sms</option>
        </select>
        <textarea id="mno" rows="3" placeholder="الأرقام (رقم في كل سطر)..."></textarea>
        <textarea id="msg" rows="4" placeholder="اكتب رسالتك..." oninput="updateSms()"></textarea>
        <div id="charWarning" class="warning-text">⚠️ تنبيه: تجاوزت 70 حرفاً (رسالتين)</div>
        <div class="sms-info">
            <span>الحروف: <b id="c-count" class="count-badge">0</b></span>
            <span>الأجزاء: <b id="s-count" class="count-badge">1</b></span>
        </div>
        <button id="sendBtn" onclick="startSending()">بدء الإرسال فوراً</button>
        <div id="status" style="margin-top:10px; color:var(--gold); text-align:center; font-size:13px;"></div>
    </div>
</div>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzLD4D45vRTr2cqz6KLOcJDrLrM_XlZGbvzyBIfQGNB_cQ6Z8BcGyUGdLSBbjPIG9Vh/exec";
const AUTH_KEY = "A@112233";
var uLimit = 0, uName = '', cPhone = '';

function showView(id) {
    document.querySelectorAll('.container').forEach(c => c.classList.add('hidden'));
    document.getElementById(id).classList.remove('hidden');
}

function updateSms() {
    let len = document.getElementById('msg').value.length;
    let segs = len <= 70 ? 1 : Math.ceil(len / 67);
    document.getElementById('c-count').innerText = len;
    document.getElementById('s-count').innerText = segs;
    document.getElementById('charWarning').style.display = len > 70 ? 'block' : 'none';
}

function login() {
    let p = document.getElementById('loginPhone').value.trim();
    let s = document.getElementById('loginPass').value;
    if(!p || !s) return alert('أدخل البيانات');
    
    fetch(`${SCRIPT_URL}?action=login&phone=${p}&pass=${s}&key=${AUTH_KEY}`)
    .then(r => r.json()).then(d => {
        if(d.ok) {
            cPhone=p; uName=d.name; uLimit=d.limit;
            document.getElementById('displayName').innerText = uName;
            document.getElementById('displayLimit').innerText = uLimit;
            showView('mainApp');
        } else alert(d.error);
    }).catch(() => alert('خطأ في الاتصال بالسيرفر'));
}

function register() {
    let n = document.getElementById('regName').value.trim();
    let p = document.getElementById('regPhone').value.trim();
    let s = document.getElementById('regPass').value;
    if(!n || !p || !s) return alert('أكمل البيانات');

    // فحص حماية OTP (3 محاولات) قبل التسجيل
    fetch(`${SCRIPT_URL}?action=send-otp&phone=${p}&key=${AUTH_KEY}`)
    .then(r => r.json()).then(d => {
        if(d.error) return alert(d.error);
        fetch(`${SCRIPT_URL}?action=register&name=${n}&phone=${p}&pass=${s}&key=${AUTH_KEY}`)
        .then(r => r.json()).then(res => {
            if(res.ok) { alert('تم طلب العضوية بنجاح!'); showView('loginSection'); }
        });
    });
}

function startSending() {
    let msg = document.getElementById('msg').value;
    let lines = document.getElementById('mno').value.split('\n');
    let nums = lines.map(n => n.trim()).filter(n => n.length === 12);
    let segs = msg.length <= 70 ? 1 : Math.ceil(msg.length / 67);

    if(!nums.length || !msg) return alert('تأكد من البيانات');
    if((nums.length * segs) > uLimit) return alert('الرصيد غير كافٍ');

    document.getElementById('sendBtn').disabled = true;
    let idx = 0;

    function sendNext() {
        if(idx >= nums.length) {
            fetch(`${SCRIPT_URL}?action=notify&text=${encodeURIComponent('🚀 حملة مكتملة لـ ' + uName + '\n💬 الرسالة: ' + msg)}&key=${AUTH_KEY}`);
            alert('اكتمل الإرسال!');
            document.getElementById('sendBtn').disabled = false;
            return;
        }
        document.getElementById('status').innerText = `جاري معالجة: ${idx+1}/${nums.length}`;
        
        // تحديث الرصيد في الشيت بعد كل رقم
        fetch(`${SCRIPT_URL}?action=update&phone=${cPhone}&newLimit=${uLimit-segs}&key=${AUTH_KEY}`)
        .then(() => {
            uLimit -= segs;
            document.getElementById('displayLimit').innerText = uLimit;
            idx++;
            setTimeout(sendNext, 500);
        });
    }
    sendNext();
}
</script>
</body>
</html>
