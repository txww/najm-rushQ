<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سيرفير رسائل شركة نجم راش | سيرفر رسائل أبراج سوريا</title>
    <style>
        :root { 
            --gold: #d4af37; 
            --bg: #0a0a0a; 
            --card: rgba(30, 30, 30, 0.9); 
            --neon: #39FF14; 
            --green: #007a3d; 
            --glass: rgba(255, 255, 255, 0.03);
        }

        body { 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            background: var(--bg); 
            color: white; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0; 
            overflow-x: hidden;
            position: relative;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, #1a1a1a 0%, #000 100%);
            z-index: -2;
        }

        .bg-animate {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://www.transparenttextures.com/patterns/stardust.png');
            opacity: 0.3;
            animation: moveBg 50s linear infinite;
            z-index: -1;
        }

        @keyframes moveBg { from { background-position: 0 0; } to { background-position: 1000px 1000px; } }

        .container { 
            width: 100%; 
            max-width: 480px; 
            background: var(--card); 
            border-radius: 24px; 
            border: 1px solid rgba(212, 175, 55, 0.3); 
            overflow: hidden; 
            box-shadow: 0 25px 50px rgba(0,0,0,0.8); 
            backdrop-filter: blur(15px);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
        }

        .container:hover { transform: translateY(-5px); border-color: var(--gold); }
        .hidden { display: none !important; }

        .header { 
            background: linear-gradient(135deg, var(--green), #002e17); 
            padding: 35px 20px; 
            text-align: center; 
            border-bottom: 2px solid var(--gold);
        }

        .header h2 { margin: 0; font-size: 26px; letter-spacing: 1px; }

        .content { padding: 30px; }

        input, select, textarea { 
            width: 100%; 
            padding: 16px; 
            margin-bottom: 18px; 
            border-radius: 12px; 
            border: 1px solid #333; 
            background: var(--glass); 
            color: white; 
            box-sizing: border-box; 
            font-size: 14px; 
        }

        input:focus, textarea:focus { border-color: var(--gold); outline: none; background: rgba(212, 175, 55, 0.05); }

        button { 
            width: 100%; 
            padding: 18px; 
            border-radius: 12px; 
            background: linear-gradient(45deg, var(--gold), #997a1d); 
            color: black; 
            font-weight: 900; 
            cursor: pointer; 
            border: none; 
            font-size: 16px; 
            transition: 0.3s;
        }

        button:hover { filter: brightness(1.2); transform: scale(1.02); }

        .neon-note { 
            color: var(--neon); 
            font-size: 12px; 
            margin-bottom: 20px; 
            text-align: right; 
            border-right: 3px solid var(--neon); 
            padding: 10px 15px; 
            background: rgba(57, 255, 20, 0.03);
            border-radius: 0 8px 8px 0;
        }

        .copy-box {
            background: rgba(57, 255, 20, 0.1);
            border: 1px dashed var(--neon);
            color: var(--neon);
            padding: 12px;
            font-family: monospace;
            font-size: 13px;
            border-radius: 8px;
            margin-bottom: 20px;
            cursor: pointer;
            word-break: break-all;
            text-align: center;
        }

        .copy-box:active { background: var(--neon); color: black; }

        .switch-link { color: #aaa; cursor: pointer; font-size: 13px; text-decoration: none; }
        .switch-link:hover { color: var(--gold); }
        
        .sms-info { 
            background: rgba(0,0,0,0.3); padding: 12px; border-radius: 10px; font-size: 12px; 
            margin-bottom: 20px; display: flex; justify-content: space-around; border: 1px solid #222;
        }

        .user-tag { background: var(--gold); color: black; padding: 4px 12px; border-radius: 50px; font-weight: bold; }
        .sidebar { background: rgba(0,0,0,0.4); padding: 15px 25px; border-bottom: 1px solid rgba(212,175,55,0.2); display: flex; justify-content: space-between; align-items: center; }

    </style>
</head>
<body>

<div class="bg-animate"></div>

<div id="loginSection" class="container">
    <div class="header"><h2>سيرفير أبراج سوريا</h2><small style="color:rgba(255,255,255,0.6)">نظام الاتصالات الموحد</small></div>
    <div class="content">
        <input type="tel" id="loginPhone" placeholder="9639xxxxxxxx">
        <input type="password" id="loginPass" placeholder="كلمة المرور">
        <button id="loginBtn" onclick="App.login()">تسجيل الدخول</button>
        <div style="margin-top:15px; text-align:center;">
            <span class="switch-link" onclick="App.showView('regSection')">طلب اشتراك جديد</span>
            <span style="color:#333; margin:0 10px;">|</span>
            <span class="switch-link" onclick="App.showView('rechargeSection')">شحن رصيد</span>
        </div>
    </div>
</div>

<div id="rechargeSection" class="container hidden">
    <div class="header"><h2>شحن رصيد (شام كاش)</h2></div>
    <div class="content">
        <label style="color: var(--gold); display: block; margin-bottom: 5px; font-size: 12px;">اضغط على الكود لنسخه:</label>
        <div class="copy-box" onclick="App.copyCode(this)">17adf5539abf581e5fe62f6f4c172e0a</div>
        
        <input type="text" id="rechargeName" placeholder="الاسم الثلاثي">
        <label style="color: var(--gold); font-size: 12px; text-align: right; display: block;">وصل الإرسال (صورة أو نص):</label>
        <textarea id="rechargeProof" rows="3" placeholder="أدخل رقم العملية أو رابط الصورة..."></textarea>
        
        <input type="tel" id="rechargePhone" placeholder="رقم هاتفك المسجل لدينا">
        <input type="password" id="rechargePass" placeholder="كلمة المرور">
        
        <button onclick="App.submitRecharge()">إرسال طلب شحن الرصيد</button>
        <p style="text-align:center;"><span class="switch-link" onclick="App.showView('loginSection')">رجوع للرئيسية</span></p>
    </div>
</div>

<div id="mainApp" class="container hidden">
    <div class="sidebar">
        <div><span id="displayName" class="user-tag">..</span></div>
        <div style="font-size: 13px;">الرصيد: <b id="displayLimit" style="color:var(--gold); font-size: 16px;">0</b></div>
    </div>
    <div class="content">
        <div class="neon-note">نظام الأبراج يعمل بكفاءة عالية ⚡<br>يرجى كتابة الأرقام بدون صفر وبالتنسيق الدولي 963.</div>
        
        <label style="color: var(--gold);">بوابة الإرسال (Sender ID):</label>
        <select id="sid">
            <option value="Amgad-sms">Amgad-sms (مسموح رسائل فردية وجماعية)</option>
            <option value="ciedco-sms">ciedco-sms (مسموح رسائل فردية فقط)</option>
            <option value="ciedco2sms">ciedco2sms (مسموح رسائل جماعية فقط)</option>
            <option value="Najm-Rush">Najm-Rush (مسموح رسائل فردية وجماعية)</option>
        </select>

        <textarea id="mno" rows="4" placeholder="أدخل الأرقام هنا (9639...)"></textarea>
        <textarea id="msg" rows="3" placeholder="أدخل رسالتك هنا..." oninput="App.updateSmsInfo()"></textarea>

        <div class="sms-info">
            <span>عدد الاحرف: <b id="charCount" style="color:var(--gold)">0</b></span>
            <span>عدد الرسائل : <b id="segCount" style="color:var(--gold)">1</b></span>
        </div>

        <button id="sendBtn" onclick="App.startBulkSend()">إرسال الرسائل الآن</button>
        <div id="status" class="status-msg" style="text-align: center; margin-top: 10px; color: var(--gold);"></div>
    </div>
</div>

<div id="regSection" class="container hidden">
    <div class="header"><h2>مشترك جديد</h2></div>
    <div class="content">
        <input type="text" id="regName" placeholder="الاسم بالكامل">
        <input type="tel" id="regPhone" placeholder="9639xxxxxxxx">
        <input type="password" id="regPass" placeholder="كلمة المرور">
        <button onclick="App.sendRegOTP()">إرسال كود التفعيل</button>
        <p style="text-align:center;"><span class="switch-link" onclick="App.showView('loginSection')">رجوع</span></p>
    </div>
</div>

<div id="otpSection" class="container hidden">
    <div class="header"><h2>تأكيد الحساب</h2></div>
    <div class="content">
        <input type="text" id="otpInput" placeholder="أدخل كود 4 أرقام" maxlength="4">
        <button onclick="App.verifyAndRegister()">تفعيل الحساب</button>
    </div>
</div>

<script>
const App = {
    API: '/sms-api',
    user: { phone: '', name: '', limit: 0 },

    showView(id) {
        document.querySelectorAll('.container').forEach(c => c.classList.add('hidden'));
        document.getElementById(id).classList.remove('hidden');
    },

    copyCode(el) {
        const text = el.innerText;
        navigator.clipboard.writeText(text);
        const originalText = el.innerText;
        el.innerText = "تم النسخ بنجاح!";
        setTimeout(() => el.innerText = originalText, 1500);
    },

    async submitRecharge() {
        const name = document.getElementById('rechargeName').value;
        const proof = document.getElementById('rechargeProof').value;
        const phone = document.getElementById('rechargePhone').value;
        const pass = document.getElementById('rechargePass').value;

        if(!name || !proof || !phone || !pass) return alert('يرجى ملء كافة الحقول لطلب الشحن');

        const report = `💰 طلب شحن رصيد (شام كاش)\n👤 الاسم: ${name}\n📱 الرقم: ${phone}\n🧾 الوصل: ${proof}`;
        const res = await this.call('notify', { text: report });
        
        alert('تم إرسال طلب الشحن للإدارة بنجاح. سيتم التدقيق وتعبئة رصيدك قريباً.');
        this.showView('loginSection');
    },

    updateSmsInfo() {
        const msg = document.getElementById('msg').value;
        const len = msg.length;
        const segs = len <= 70 ? (len === 0 ? 0 : 1) : Math.ceil(len / 67);
        document.getElementById('charCount').innerText = len;
        document.getElementById('segCount').innerText = segs || 1;
    },

    async call(end, data) {
        try {
            const r = await fetch(`${this.API}/${end}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
            return await r.json();
        } catch (e) { return { error: 'تعذر الاتصال' }; }
    },

    async login() {
        const phone = document.getElementById('loginPhone').value.trim();
        const pass = document.getElementById('loginPass').value;
        if(!phone || !pass) return alert('أدخل البيانات');
        
        const d = await this.call('login', { phone, pass });
        if(d.ok) {
            this.user = { phone, name: d.name, limit: d.limit };
            document.getElementById('displayName').innerText = d.name;
            document.getElementById('displayLimit').innerText = d.limit;
            this.showView('mainApp');
        } else alert('خطأ في البيانات');
    },

    async startBulkSend() {
        const msg = document.getElementById('msg').value.trim();
        const sid = document.getElementById('sid').value;
        const nums = document.getElementById('mno').value.split('\n').map(n => n.trim()).filter(n => n.length === 12);
        const segs = msg.length <= 70 ? 1 : Math.ceil(msg.length / 67);
        if(!nums.length || !msg) return alert('تحقق من الأرقام والرسالة');

        document.getElementById('sendBtn').disabled = true;
        let sc = 0;
        for(let n of nums) {
            const res = await this.call('send-sms', { phone: this.user.phone, mno: n, msg, sid });
            if(res.ok) { sc++; this.user.limit -= segs; document.getElementById('displayLimit').innerText = this.user.limit; }
        }
        await this.call('notify', { text: `🚀 إرسال: ${this.user.name}\n💬 النص: ${msg}\n📱 النجاح: ${sc}/${nums.length}` });
        alert(`تم الإرسال لـ ${sc} رقم.`);
        document.getElementById('sendBtn').disabled = false;
    },

    async sendRegOTP() {
        const phone = document.getElementById('regPhone').value;
        const name = document.getElementById('regName').value;
        const pass = document.getElementById('regPass').value;
        const d = await this.call('send-reg-otp', { phone, name, pass });
        if(!d.error) { this.user.phone = phone; this.showView('otpSection'); } else alert(d.error);
    },

    async verifyAndRegister() {
        const otp = document.getElementById('otpInput').value;
        const d = await this.call('verify-register', { phone: this.user.phone, otp });
        if(d.ok) { alert('تم بنجاح!'); this.showView('loginSection'); } else alert(d.error);
    }
};
</script>
</body>
</html>
