<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سيرفير شركة نجم راش | أبراج سوريا</title>
    <style>
        :root { 
            --gold: #d4af37; 
            --bg: #0a0a0a; 
            --card: rgba(30, 30, 30, 0.9); 
            --neon: #39FF14; 
            --green: #007a3d; 
            --glass: rgba(255, 255, 255, 0.03);
        }

        body { 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            background: var(--bg); 
            color: white; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0; 
            overflow-x: hidden;
            position: relative;
        }

        .bg-animate {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, #1a1a1a 0%, #000 100%);
            z-index: -1;
        }

        .container { 
            width: 100%; 
            max-width: 480px; 
            background: var(--card); 
            border-radius: 24px; 
            border: 1px solid rgba(212, 175, 55, 0.3); 
            overflow: hidden; 
            box-shadow: 0 25px 50px rgba(0,0,0,0.8); 
            backdrop-filter: blur(15px);
            position: relative;
        }

        .hidden { display: none !important; }

        .header { 
            background: linear-gradient(135deg, var(--green), #002e17); 
            padding: 30px 20px; 
            text-align: center; 
            border-bottom: 2px solid var(--gold);
        }

        .content { padding: 25px; }

        input, select, textarea { 
            width: 100%; 
            padding: 14px; 
            margin-bottom: 15px; 
            border-radius: 12px; 
            border: 1px solid #333; 
            background: var(--glass); 
            color: white; 
            box-sizing: border-box; 
        }

        button { 
            width: 100%; 
            padding: 16px; 
            border-radius: 12px; 
            background: linear-gradient(45deg, var(--gold), #997a1d); 
            color: black; 
            font-weight: 900; 
            cursor: pointer; 
            border: none; 
            transition: 0.3s;
        }

        button:disabled { background: #444; color: #777; cursor: not-allowed; }

        .sms-info { 
            background: rgba(0,0,0,0.3); padding: 10px; border-radius: 10px; font-size: 12px; 
            margin-bottom: 15px; display: flex; justify-content: space-around;
        }

        .user-tag { background: var(--gold); color: black; padding: 4px 12px; border-radius: 50px; font-weight: bold; }
        .sidebar { background: rgba(0,0,0,0.4); padding: 15px; border-bottom: 1px solid rgba(212,175,55,0.2); display: flex; justify-content: space-between; align-items: center; }
        .switch-link { color: var(--gold); cursor: pointer; text-decoration: underline; font-size: 13px; }
    </style>
</head>
<body>

<div class="bg-animate"></div>

<div id="loginSection" class="container">
    <div class="header"><h2>سيرفير أبراج سوريا</h2></div>
    <div class="content">
        <input type="tel" id="loginPhone" placeholder="رقم الهاتف (9639...)">
        <input type="password" id="loginPass" placeholder="كلمة المرور">
        <button onclick="App.login()">تسجيل الدخول</button>
        <div style="margin-top:15px; text-align:center;">
            <span class="switch-link" onclick="App.showView('regSection')">إنشاء حساب جديد</span>
            <span style="margin:0 10px; color:#444;">|</span>
            <span class="switch-link" onclick="App.showView('rechargeSection')">شحن رصيد</span>
        </div>
    </div>
</div>

<div id="regSection" class="container hidden">
    <div class="header"><h2>مشترك جديد</h2></div>
    <div class="content">
        <input type="text" id="regName" placeholder="الاسم الكامل">
        <input type="tel" id="regPhone" placeholder="رقم الهاتف">
        <input type="password" id="regPass" placeholder="كلمة المرور">
        <button onclick="App.register()">إرسال طلب الانضمام</button>
        <p style="text-align:center;"><span class="switch-link" onclick="App.showView('loginSection')">رجوع</span></p>
    </div>
</div>

<div id="rechargeSection" class="container hidden">
    <div class="header"><h2>شحن رصيد</h2></div>
    <div class="content">
        <input type="text" id="recName" placeholder="الاسم الثلاثي">
        <input type="tel" id="recPhone" placeholder="رقم هاتفك">
        <textarea id="recProof" placeholder="تفاصيل الوصل أو عملية التحويل..."></textarea>
        <button onclick="App.submitRecharge()">إرسال الطلب عبر التلغرام</button>
        <p style="text-align:center;"><span class="switch-link" onclick="App.showView('loginSection')">رجوع</span></p>
    </div>
</div>

<div id="mainApp" class="container hidden">
    <div class="sidebar">
        <div><span id="displayName" class="user-tag">..</span></div>
        <div>رصيدك: <b id="displayLimit" style="color:var(--gold)">0</b></div>
    </div>
    <div class="content">
        <label>بوابة الإرسال:</label>
        <select id="sid">
            <option value="Amgad-sms">Amgad-sms</option>
            <option value="ciedco-sms">ciedco-sms</option>
            <option value="ciedco2sms">ciedco2sms</option>
            <option value="Najm-Rush">Najm-Rush</option>
        </select>

        <textarea id="mno" rows="4" placeholder="الأرقام (رقم في كل سطر)"></textarea>
        <textarea id="msg" rows="3" placeholder="نص الرسالة..." oninput="App.updateInfo()"></textarea>

        <div class="sms-info">
            <span>الحروف: <b id="charCount">0</b></span>
            <span>الأجزاء: <b id="segCount">1</b></span>
        </div>

        <button id="sendBtn" onclick="App.sendBulk()">إرسال الرسائل الآن</button>
        <div id="status" style="text-align:center; margin-top:10px; font-size:13px; color:var(--gold);"></div>
    </div>
</div>

<script>
const App = {
    // الرابط الجديد الذي زودتني به
    API: 'https://script.google.com/macros/s/AKfycbxdfdjGJirT8wQOEQChcR0tvIkvkUdq8C2-MHRBPtXx1EXk-aA47cPCJs_f2yg7o-jy/exec',
    user: { phone: '', name: '', limit: 0 },

    showView(id) {
        document.querySelectorAll('.container').forEach(c => c.classList.add('hidden'));
        document.getElementById(id).classList.remove('hidden');
    },

    async call(end, data) {
        try {
            const r = await fetch(`${this.API}?endpoint=${end}`, {
                method: 'POST',
                body: JSON.stringify(data)
            });
            return await r.json();
        } catch (e) { return { ok: false, error: 'خطأ اتصال' }; }
    },

    async login() {
        const phone = document.getElementById('loginPhone').value.trim();
        const pass = document.getElementById('loginPass').value;
        const res = await this.call('login', { phone, pass });
        if(res.ok) {
            this.user = { phone, name: res.name, limit: res.limit };
            document.getElementById('displayName').innerText = res.name;
            document.getElementById('displayLimit').innerText = res.limit;
            this.showView('mainApp');
        } else alert('بيانات خاطئة');
    },

    async register() {
        const data = {
            name: document.getElementById('regName').value,
            phone: document.getElementById('regPhone').value,
            pass: document.getElementById('regPass').value
        };
        const msg = `🆕 طلب حساب جديد:\n👤 الاسم: ${data.name}\n📱 الرقم: ${data.phone}\n🔑 الكلمة: ${data.pass}`;
        await this.call('notify', { text: msg });
        alert('تم إرسال طلبك للإدارة للموافقة');
        this.showView('loginSection');
    },

    async sendBulk() {
        const msg = document.getElementById('msg').value.trim();
        const nums = document.getElementById('mno').value.split('\n').filter(n => n.length > 5);
        const segs = Math.ceil(msg.length / 67) || 1;
        const totalCost = nums.length * segs;

        if(this.user.limit < totalCost) return alert('رصيدك غير كافٍ!');

        document.getElementById('sendBtn').disabled = true;
        let success = 0;

        for(let n of nums) {
            document.getElementById('status').innerText = `جاري الإرسال إلى ${n}...`;
            // هنا تضع كود الإرسال الفعلي للبوابة
            success++;
        }

        // تحديث الرصيد في السيرفر
        const newLimit = this.user.limit - totalCost;
        const up = await this.call('update-limit', { phone: this.user.phone, newLimit });
        
        if(up.ok) {
            this.user.limit = newLimit;
            document.getElementById('displayLimit').innerText = newLimit;
            const report = `🚀 تقرير إرسال\n👤 المستخدم: ${this.user.name}\n📱 الأرقام: ${nums.length}\n💰 الخصم: ${totalCost}\n📉 الرصيد الحالي: ${newLimit}`;
            await this.call('notify', { text: report });
            alert('اكتملت العملية بنجاح');
        }

        document.getElementById('status').innerText = '';
        document.getElementById('sendBtn').disabled = false;
    },

    async submitRecharge() {
        const msg = `💰 طلب شحن رصيد:\n👤 الاسم: ${document.getElementById('recName').value}\n📱 الرقم: ${document.getElementById('recPhone').value}\n🧾 الوصل: ${document.getElementById('recProof').value}`;
        await this.call('notify', { text: msg });
        alert('تم إرسال طلب الشحن');
        this.showView('loginSection');
    },

    updateInfo() {
        const len = document.getElementById('msg').value.length;
        document.getElementById('charCount').innerText = len;
        document.getElementById('segCount').innerText = Math.ceil(len / 67) || 1;
    }
};
</script>
</body>
</html>
