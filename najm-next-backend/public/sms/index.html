<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abraj Syria - Elite</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #c5a059; --bg: #0a0a0b; --card: #141416; --accent: #00ff88; }
        body { font-family: 'Cairo', sans-serif; background: var(--bg); color: #eaeaeb; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 15px; }
        .app-container { width: 100%; max-width: 420px; background: var(--card); border: 1px solid rgba(197, 160, 89, 0.2); border-radius: 28px; box-shadow: 0 30px 60px rgba(0,0,0,0.5); overflow: hidden; }
        .hidden { display: none !important; }
        .header { background: linear-gradient(135deg, #0d2e1f, #050505); padding: 35px 20px; text-align: center; border-bottom: 2px solid var(--gold); }
        .header h2 { margin: 0; font-size: 24px; font-weight: 900; letter-spacing: 1px; color: var(--gold); }
        .status-bar { background: #1c1c1e; padding: 12px 20px; display: flex; justify-content: space-between; font-size: 13px; border-bottom: 1px solid #2c2c2e; }
        .user-pill { color: var(--gold); font-weight: 700; background: rgba(197, 160, 89, 0.1); padding: 2px 10px; border-radius: 20px; }
        .form-body { padding: 25px; }
        input, select, textarea { width: 100%; padding: 14px; margin-bottom: 15px; border-radius: 14px; border: 1px solid #2c2c2e; background: #0a0a0a; color: #fff; box-sizing: border-box; outline: none; transition: 0.3s; font-family: 'Cairo'; }
        input:focus { border-color: var(--gold); }
        button { width: 100%; padding: 16px; border-radius: 14px; border: none; background: var(--gold); color: #000; font-weight: 900; cursor: pointer; font-size: 16px; transition: 0.3s; }
        button:hover { opacity: 0.9; transform: translateY(-1px); }
        .info-row { display: flex; justify-content: space-between; font-size: 12px; margin-bottom: 15px; color: #8e8e93; }
        .info-row b { color: var(--accent); }
    </style>
</head>
<body>

<div id="loginPage" class="app-container">
    <div class="header"><h2>سيرفر أبراج سوريا</h2></div>
    <div class="form-body">
        <input type="tel" id="user" placeholder="رقم المشترك">
        <input type="password" id="pass" placeholder="كلمة المرور">
        <button id="lBtn" onclick="doLogin()">دخول للمنصة</button>
    </div>
</div>

<div id="mainPage" class="app-container hidden">
    <div class="status-bar">
        <span>👤 <span id="dspName" class="user-pill">..</span></span>
        <span>رصيد: <b id="dspLimit" style="color:var(--gold)">0</b></span>
    </div>
    <div class="form-body">
        <select id="sender">
            <option value="Amgad-sms">Amgad-sms</option>
            <option value="Abraj-Syria">Abraj-Syria</option>
            <option value="Najm-Rush">Najm-Rush</option>
            <option value="Samer-Telecom">Samer-Telecom</option>
        </select>
        <textarea id="numbers" rows="3" placeholder="الأرقام (رقم بكل سطر)"></textarea>
        <textarea id="text" rows="3" placeholder="نص الرسالة..." oninput="calc()"></textarea>
        <div class="info-row">
            <span>حروف: <b id="charCnt">0</b></span>
            <span>أجزاء: <b id="partCnt">1</b></span>
        </div>
        <button id="sBtn" onclick="runCampaign()">بدء الحملة</button>
        <div id="msgLog" style="text-align:center; font-size:12px; margin-top:10px; color:var(--gold)"></div>
    </div>
</div>

<script>
// الرابط الجديد AKfycbxBqp...
const API = "https://script.google.com/macros/s/AKfycbxBqpO-Yrxb1b9l_-DsAKfXCFy2mT8QvbIazsvSd5599q94iAr2T1BWtOZvZIX-NY_m/exec";
const KEY = "A@112233";
var uP, uN, uL;

function calc() {
    let l = document.getElementById('text').value.length;
    document.getElementById('charCnt').innerText = l;
    document.getElementById('partCnt').innerText = l <= 70 ? 1 : Math.ceil(l/67);
}

function doLogin() {
    let p = document.getElementById('user').value, s = document.getElementById('pass').value;
    if(!p || !s) return;
    document.getElementById('lBtn').innerText = "جاري التحقق...";
    
    fetch(`${API}?action=login&phone=${p}&pass=${s}&key=${KEY}`)
    .then(r => r.json()).then(d => {
        if(d.ok) {
            uP=p; uN=d.name; uL=d.limit;
            document.getElementById('dspName').innerText = uN;
            document.getElementById('dspLimit').innerText = uL;
            document.getElementById('loginPage').classList.add('hidden');
            document.getElementById('mainPage').classList.remove('hidden');
        } else {
            alert("خطأ: البيانات غير صحيحة");
            document.getElementById('lBtn').innerText = "دخول للمنصة";
        }
    }).catch(e => alert("تأكد من إعدادات النشر في سكريبت جوجل (Anyone)"));
}

function runCampaign() {
    let m = document.getElementById('text').value, sdr = document.getElementById('sender').value;
    let nums = document.getElementById('numbers').value.split('\n').filter(x => x.trim().length >= 10);
    let segs = m.length <= 70 ? 1 : Math.ceil(m.length/67);

    if(!nums.length || !m) return alert("أكمل البيانات");
    document.getElementById('sBtn').disabled = true;

    // إرسال تلغرام عند البدء
    fetch(`${API}?action=notify&text=${encodeURIComponent('🚀 حملة جديدة\n👤: '+uN+'\n🆔: '+sdr+'\n📱: '+nums.length)}&key=${KEY}`);

    let i = 0;
    function next() {
        if(i >= nums.length) {
            alert("تم بنجاح!");
            document.getElementById('sBtn').disabled = false;
            document.getElementById('msgLog').innerText = "";
            return;
        }
        document.getElementById('msgLog').innerText = `إرسال ${i+1}/${nums.length}...`;
        fetch(`${API}?action=update&phone=${uP}&newLimit=${uL-segs}&sid=${sdr}&msg=${encodeURIComponent(m)}&key=${KEY}`)
        .then(() => {
            uL -= segs;
            document.getElementById('dspLimit').innerText = uL;
            i++; setTimeout(next, 300);
        });
    }
    next();
}
</script>
</body>
</html>
