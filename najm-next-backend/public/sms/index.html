<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سيرفر رسائل أبراج سوريا - النسخة الفاخرة</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #d4af37; --bg: #0d0d0d; --card: #1a1a1a; --neon: #39FF14; --green: #007a3d; }
        body { font-family: 'Cairo', sans-serif; background: var(--bg); color: white; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 10px; }
        .container { width: 100%; max-width: 450px; background: var(--card); border-radius: 20px; border: 1px solid rgba(212, 175, 55, 0.3); overflow: hidden; box-shadow: 0 15px 50px rgba(0,0,0,0.8); transition: 0.3s; }
        .hidden { display: none !important; }
        .header { background: linear-gradient(135deg, var(--green), #002b16); padding: 25px; text-align: center; border-bottom: 3px solid var(--gold); }
        .header h2 { margin: 0; font-weight: 900; letter-spacing: 1px; }
        .sidebar { background: #222; padding: 12px 20px; border-bottom: 1px solid #333; display: flex; justify-content: space-between; align-items: center; font-size: 14px; }
        .user-tag { background: var(--gold); color: black; padding: 3px 12px; border-radius: 50px; font-weight: bold; }
        .content { padding: 25px; }
        input, select, textarea, button { width: 100%; padding: 14px; margin-bottom: 15px; border-radius: 12px; border: 1px solid #333; background: #0a0a0a; color: white; box-sizing: border-box; font-size: 15px; font-family: 'Cairo'; outline: none; transition: 0.3s; }
        input:focus, textarea:focus { border-color: var(--gold); background: #000; }
        button { background: linear-gradient(45deg, var(--gold), #b38f2d); color: black; font-weight: 900; cursor: pointer; border: none; text-transform: uppercase; }
        button:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(212, 175, 55, 0.3); }
        button:disabled { background: #444; color: #888; cursor: not-allowed; transform: none; }
        label { display: block; text-align: right; margin-bottom: 8px; font-size: 13px; color: var(--gold); font-weight: bold; }
        .neon-note { color: var(--neon); font-size: 12px; font-weight: bold; margin-bottom: 15px; text-align: right; border: 1px dashed var(--neon); padding: 12px; border-radius: 10px; background: rgba(57, 255, 20, 0.03); }
        .switch-link { color: var(--gold); cursor: pointer; text-decoration: none; font-size: 13px; font-weight: bold; transition: 0.3s; }
        .switch-link:hover { color: white; }
        .sms-info { background: rgba(255,255,255,0.03); padding: 12px; border-radius: 10px; font-size: 13px; margin-bottom: 20px; display: flex; justify-content: space-between; border: 1px solid #333; }
        .badge { color: var(--gold); font-weight: 900; }
    </style>
</head>
<body>

<div id="loginSection" class="container">
    <div class="header"><h2>سيرفر أبراج سوريا</h2></div>
    <div class="content">
        <input type="tel" id="loginPhone" placeholder="رقم الهاتف (9639...)">
        <input type="password" id="loginPass" placeholder="كلمة المرور">
        <button id="loginBtn" onclick="login()">دخول للمنصة</button>
        <p style="text-align:center;">
            <span class="switch-link" onclick="showView('regSection')">إنشاء حساب</span> 
            <span style="color:#444; margin:0 10px;">|</span>
            <span class="switch-link" onclick="showView('forgotSection')">نسيت كلمة المرور؟</span>
        </p>
    </div>
</div>

<div id="forgotSection" class="container hidden">
    <div class="header"><h2>استعادة الحساب</h2></div>
    <div class="content">
        <input type="tel" id="forgotPhone" placeholder="أدخل رقمك 9639xxxxxxxx">
        <button onclick="alert('تواصل مع الإدارة لاستعادة الحساب')">إرسال كود التغيير</button>
        <p style="text-align:center;"><span class="switch-link" onclick="showView('loginSection')">رجوع للدخول</span></p>
    </div>
</div>

<div id="regSection" class="container hidden">
    <div class="header"><h2>عضوية جديدة</h2></div>
    <div class="content">
        <input type="text" id="regName" placeholder="الاسم الكامل">
        <input type="tel" id="regPhone" placeholder="9639xxxxxxxx">
        <input type="password" id="regPass" placeholder="كلمة المرور">
        <button id="regBtn" onclick="register()">إرسال طلب تفعيل</button>
        <p style="text-align:center;"><span class="switch-link" onclick="showView('loginSection')">لديك حساب؟ دخول</span></p>
    </div>
</div>

<div id="mainApp" class="container hidden">
    <div class="sidebar">
        <div>👤 مرحباً: <span id="displayName" class="user-tag">..</span></div>
        <div>💰 الرصيد: <b id="displayLimit" class="badge">0</b></div>
    </div>
    <div class="content">
        <div class="neon-note">⚠️ الأرقام تبدأ بـ 963 (رقم بكل سطر)</div>
        <label>المعرف (Sender ID):</label>
        <select id="sid">
            <option value="Amgad-sms">Amgad-sms</option>
            <option value="Najm-Rush">Najm-Rush</option>
            <option value="Abraj-Syria">Abraj-Syria</option>
            <option value="Samer-Telecom">Samer-Telecom</option>
        </select>
        <label>أرقام المستلمين:</label>
        <textarea id="mno" rows="4" placeholder="9639xxxxxxxx"></textarea>
        <label>نص الرسالة:</label>
        <textarea id="msg" rows="3" placeholder="اكتب رسالتك..." oninput="updateSmsInfo()"></textarea>
        <div class="sms-info">
            <span>الحروف: <b id="charCount" class="badge">0</b></span>
            <span>الأجزاء: <b id="segCount" class="badge">1</b></span>
        </div>
        <button id="sendBtn" onclick="startSending()">بدء الإرسال الفوري</button>
        <div id="status" style="text-align:center; font-size:13px; margin-top:10px; color:var(--gold); font-weight:bold;"></div>
    </div>
</div>

<script>
// الرابط الجديد الخاص بك
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxBqpO-Yrxb1b9l_-DsAKfXCFy2mT8QvbIazsvSd5599q94iAr2T1BWtOZvZIX-NY_m/exec";
const KEY = "A@112233";
var uLimit = 0, uName = '', cPhone = '';

function showView(id) {
    document.querySelectorAll('.container').forEach(el => el.classList.add('hidden'));
    document.getElementById(id).classList.remove('hidden');
}

function updateSmsInfo() {
    var len = document.getElementById('msg').value.length;
    document.getElementById('charCount').innerText = len;
    document.getElementById('segCount').innerText = len <= 70 ? 1 : Math.ceil(len / 67);
}

function login() {
    var p = document.getElementById('loginPhone').value.trim();
    var s = document.getElementById('loginPass').value;
    if (!p || !s) return alert('أدخل البيانات');
    
    document.getElementById('loginBtn').innerText = "جاري التحقق...";
    fetch(`${SCRIPT_URL}?action=login&phone=${p}&pass=${s}&key=${KEY}`)
    .then(r => r.json()).then(d => {
        if (d.ok) {
            cPhone = p; uName = d.name; uLimit = d.limit;
            document.getElementById('displayName').innerText = uName;
            document.getElementById('displayLimit').innerText = uLimit;
            showView('mainApp');
        } else { alert('بيانات الدخول خاطئة'); }
        document.getElementById('loginBtn').innerText = "دخول للمنصة";
    }).catch(() => { alert('خطأ في الاتصال بالسيرفر'); document.getElementById('loginBtn').innerText = "دخول للمنصة"; });
}

function register() {
    var n = document.getElementById('regName').value;
    var p = document.getElementById('regPhone').value;
    var s = document.getElementById('regPass').value;
    if (!n || !p || !s) return alert('أكمل البيانات');
    
    fetch(`${SCRIPT_URL}?action=register&name=${encodeURIComponent(n)}&phone=${p}&pass=${s}&key=${KEY}`)
    .then(r => r.json()).then(d => {
        if (d.ok) { alert('تم طلب العضوية بنجاح!'); showView('loginSection'); }
    });
}

function startSending() {
    var btn = document.getElementById('sendBtn');
    var st = document.getElementById('status');
    var msg = document.getElementById('msg').value;
    var sid = document.getElementById('sid').value;
    var lines = document.getElementById('mno').value.split('\n').filter(l => l.trim().length >= 10);
    
    var segs = msg.length <= 70 ? 1 : Math.ceil(msg.length / 67);
    if (!lines.length || !msg) return alert('أدخل الأرقام والرسالة');
    if ((lines.length * segs) > uLimit) return alert('رصيدك غير كافٍ');

    btn.disabled = true;
    // إخطار تلغرام عند البدء
    fetch(`${SCRIPT_URL}?action=notify&text=${encodeURIComponent('🚀 حملة جديدة\n👤: '+uName+'\n💬: '+msg+'\n📱 العدد: '+lines.length)}&key=${KEY}`);

    var i = 0;
    function next() {
        if (i >= lines.length) {
            alert('تم انتهاء الحملة بنجاح!');
            btn.disabled = false;
            st.innerText = '';
            return;
        }
        st.innerText = 'إرسال: ' + (i + 1) + ' / ' + lines.length;
        
        // تحديث الرصيد وتسجيل اللوك
        fetch(`${SCRIPT_URL}?action=update&phone=${cPhone}&newLimit=${uLimit-segs}&sid=${sid}&msg=${encodeURIComponent(msg)}&key=${KEY}`)
        .then(() => {
            uLimit -= segs;
            document.getElementById('displayLimit').innerText = uLimit;
            i++;
            setTimeout(next, 500);
        });
    }
    next();
}
</script>
</body>
</html>
