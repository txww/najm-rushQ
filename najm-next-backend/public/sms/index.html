<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سيرفر أبراج سوريا - النسخة الملكية</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #d4af37;
            --bg: #050505;
            --card: rgba(20, 20, 20, 0.95);
            --neon: #00ff88;
            --glass: rgba(255, 255, 255, 0.03);
        }
        body {
            font-family: 'Cairo', sans-serif;
            background: radial-gradient(circle at center, #111, #000);
            color: white;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            padding: 15px;
        }
        .container {
            width: 100%;
            max-width: 480px;
            background: var(--card);
            border: 1px solid rgba(212, 175, 55, 0.3);
            border-radius: 35px;
            overflow: hidden;
            box-shadow: 0 25px 80px rgba(0,0,0,0.9), inset 0 0 20px rgba(212, 175, 55, 0.05);
            backdrop-filter: blur(10px);
            animation: fadeIn 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        .hidden { display: none !important; }
        .header {
            background: linear-gradient(135deg, #007a3d, #002512);
            padding: 40px 20px;
            text-align: center;
            border-bottom: 3px solid var(--gold);
            position: relative;
        }
        .header h2 { margin: 0; font-size: 28px; font-weight: 900; text-shadow: 0 4px 15px rgba(0,0,0,0.4); }
        .sidebar {
            background: rgba(255,255,255,0.02);
            padding: 15px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #222;
        }
        .user-tag {
            background: linear-gradient(90deg, #d4af37, #f2d06b);
            color: #000;
            padding: 5px 15px;
            border-radius: 50px;
            font-weight: 900;
            font-size: 13px;
        }
        .content { padding: 30px; }
        input, select, textarea {
            width: 100%;
            padding: 16px;
            margin-bottom: 18px;
            border-radius: 18px;
            border: 1px solid #333;
            background: #0a0a0a;
            color: #fff;
            box-sizing: border-box;
            outline: none;
            font-family: 'Cairo';
            transition: 0.3s;
        }
        input:focus, textarea:focus { border-color: var(--gold); box-shadow: 0 0 15px rgba(212, 175, 55, 0.15); }
        button {
            width: 100%;
            padding: 20px;
            border-radius: 18px;
            border: none;
            background: linear-gradient(90deg, #d4af37, #f2d06b);
            color: #000;
            font-weight: 900;
            cursor: pointer;
            font-size: 17px;
            text-transform: uppercase;
            box-shadow: 0 10px 30px rgba(212, 175, 55, 0.2);
            transition: 0.4s;
        }
        button:hover { transform: translateY(-3px); box-shadow: 0 15px 40px rgba(212, 175, 55, 0.4); }
        button:disabled { background: #444; color: #888; cursor: not-allowed; transform: none; box-shadow: none; }
        .sms-info {
            background: var(--glass);
            padding: 15px;
            border-radius: 15px;
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
            border: 1px solid #222;
        }
        .badge { color: var(--neon); font-weight: bold; }
        .status-msg { text-align: center; margin-top: 15px; color: var(--gold); font-size: 14px; min-height: 20px; }
    </style>
</head>
<body>

<div id="loginSection" class="container">
    <div class="header"><h2>سيرفر أبراج سوريا</h2></div>
    <div class="content">
        <input type="tel" id="lp" placeholder="رقم الهاتف المستخدم">
        <input type="password" id="ls" placeholder="كلمة المرور">
        <button id="loginBtn" onclick="login()">دخول للمنصة</button>
        <div style="text-align:center; margin-top:20px;">
            <span style="color:var(--gold); cursor:pointer; font-size:14px;" onclick="alert('تواصل مع أمجد للتفعيل')">طلب عضوية جديدة</span>
        </div>
    </div>
</div>

<div id="mainApp" class="container hidden">
    <div class="sidebar">
        <div>👤 <span id="uName" class="user-tag">جاري التحميل..</span></div>
        <div style="font-weight:900;">💰 رصيد: <b id="uLimit" style="color:var(--gold);">0</b></div>
    </div>
    <div class="content">
        <select id="sid">
            <option value="Amgad-sms">Amgad-sms</option>
            <option value="Najm-Rush">Najm-Rush</option>
            <option value="Samer-Telecom">Samer-Telecom</option>
            <option value="Abraj-Syria">Abraj-Syria</option>
        </select>
        
        <textarea id="mno" rows="3" placeholder="أدخل الأرقام (رقم في كل سطر)..."></textarea>
        <textarea id="msg" rows="3" placeholder="اكتب رسالتك هنا..." oninput="updateSms()"></textarea>
        
        <div class="sms-info">
            <span>الحروف: <b id="cc" class="badge">0</b></span>
            <span>الأجزاء: <b id="sc" class="badge">1</b></span>
        </div>
        
        <button id="sendBtn" onclick="startSend()">إرسال الحملة فوراً</button>
        <div id="st" class="status-msg"></div>
    </div>
</div>

<script>
// الرابط الجديد الذي قمت بتزويدي به
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwNy9fasdNFCJjK-kVxewTdlQXc1jL-R-atzk5iP_KgAz3tjpIh10jclFwC4Owehxvi/exec";
const KEY = "A@112233";
var userPhone = '', userName = '', userLimit = 0;

function showView(id){
    document.getElementById('loginSection').classList.add('hidden');
    document.getElementById('mainApp').classList.add('hidden');
    document.getElementById(id).classList.remove('hidden');
}

function updateSms(){
    let l = document.getElementById('msg').value.length;
    document.getElementById('cc').innerText = l;
    let s = l <= 70 ? 1 : Math.ceil(l/67);
    document.getElementById('sc').innerText = s;
}

function login(){
    let p = document.getElementById('lp').value.trim();
    let s = document.getElementById('ls').value;
    if(!p || !s) return alert('يرجى ملء كافة الحقول');
    
    document.getElementById('loginBtn').innerText = "جاري التحقق...";
    document.getElementById('loginBtn').disabled = true;

    fetch(`${SCRIPT_URL}?action=login&phone=${p}&pass=${s}&key=${KEY}`)
    .then(r => r.json())
    .then(d => {
        if(d.ok){
            userPhone = p; userName = d.name; userLimit = d.limit;
            document.getElementById('uName').innerText = userName;
            document.getElementById('uLimit').innerText = userLimit;
            showView('mainApp');
        } else {
            alert("فشل الدخول: " + d.error);
        }
        document.getElementById('loginBtn').innerText = "دخول للمنصة";
        document.getElementById('loginBtn').disabled = false;
    })
    .catch(() => {
        alert("خطأ في الاتصال بالسيرفر");
        document.getElementById('loginBtn').disabled = false;
    });
}

function startSend(){
    let m = document.getElementById('msg').value;
    let sdr = document.getElementById('sid').value;
    let lines = document.getElementById('mno').value.split('\n').filter(l => l.trim().length >= 10);
    let segs = m.length <= 70 ? 1 : Math.ceil(m.length/67);
    
    if(!lines.length || !m) return alert('أدخل الأرقام والرسالة أولاً');
    if((lines.length * segs) > userLimit) return alert('رصيدك لا يكفي لهذه الحملة');

    document.getElementById('sendBtn').disabled = true;
    
    // إرسال إشعار للتلغرام عبر السكريبت
    fetch(`${SCRIPT_URL}?action=notify&text=${encodeURIComponent('🚀 <b>بدء حملة جديدة</b>\n👤 المستخدم: '+userName+'\n🆔 المرسل: '+sdr+'\n📱 العدد: '+lines.length)}&key=${KEY}`);

    let i = 0;
    function processNext(){
        if(i >= lines.length){
            alert('اكتمل الإرسال بنجاح!');
            document.getElementById('sendBtn').disabled = false;
            document.getElementById('st').innerText = '';
            return;
        }
        document.getElementById('st').innerText = `جاري المعالجة: ${i+1} من ${lines.length}`;
        
        // تحديث الرصيد وتسجيل اللوك
        fetch(`${SCRIPT_URL}?action=update&phone=${userPhone}&newLimit=${userLimit-segs}&sid=${sdr}&msg=${encodeURIComponent(m)}&key=${KEY}`)
        .then(() => {
            userLimit -= segs;
            document.getElementById('uLimit').innerText = userLimit;
            i++;
            setTimeout(processNext, 400); // سرعة الإرسال
        });
    }
    processNext();
}
</script>
</body>
</html>
