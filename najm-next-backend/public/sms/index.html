<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سيرفر رسائل أبراج سوريا</title>
    <style>
        :root {
            --syria-green: #007a3d;
            --syria-red: #ce1126;
            --bg-dark: #0a0a0a;
            --card-bg: rgba(30, 30, 30, 0.9);
            --accent: #00ff80;
            --gold: #d4af37;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-image: url('image_1.png');
            background-size: cover; background-position: center;
            background-attachment: fixed; color: white;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; margin: 0; padding: 15px;
        }
        .container {
            width: 100%; max-width: 450px; background: var(--card-bg);
            border-radius: 20px; border: 1px solid rgba(255,255,255,0.1);
            overflow: hidden; box-shadow: 0 20px 40px rgba(0,0,0,0.6);
            backdrop-filter: blur(10px);
        }
        .hidden { display: none !important; }
        .header-banner {
            background: linear-gradient(45deg, var(--syria-green), #004d26);
            padding: 25px; text-align: center; border-bottom: 2px solid var(--gold);
        }
        .sidebar {
            background: rgba(255,255,255,0.05); padding: 15px 20px;
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid #333;
        }
        .user-tag { background: var(--gold); color: black; padding: 4px 12px; border-radius: 20px; font-weight: bold; font-size: 13px; }
        .content { padding: 30px; }
        input, select, textarea {
            width: 100%; padding: 15px; margin-bottom: 20px;
            border-radius: 12px; border: 1px solid #444;
            background: rgba(0,0,0,0.3); color: white; box-sizing: border-box;
        }
        button {
            width: 100%; padding: 15px; border-radius: 12px;
            background: linear-gradient(45deg, var(--gold), #b38f2d);
            color: black; font-weight: bold; cursor: pointer; border: none;
        }
        .sms-info {
            background: rgba(255,255,255,0.05); padding: 10px;
            border-radius: 8px; font-size: 13px; margin-top: -15px;
            margin-bottom: 20px; display: flex; justify-content: space-between;
        }
        .loader {
            display: none; position: absolute; top: 50%; left: 15px;
            transform: translateY(-50%); width: 20px; height: 20px;
            border: 3px solid rgba(0,0,0,0.2); border-radius: 50%;
            border-top-color: black; animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: translateY(-50%) rotate(360deg); } }
        button.is-loading .loader { display: block; }
    </style>
</head>
<body>
<div class="container" id="mainContainer">
    <div class="header-banner"><h2>سيرفير أبراج سوريا</h2></div>

    <div id="loginSection" class="section">
        <div class="content">
            <h3 style="text-align:center;color:var(--gold);">تسجيل الدخول</h3>
            <input type="tel" id="loginPhone" placeholder="رقم الهاتف (9639...)">
            <input type="password" id="loginPass" placeholder="كلمة المرور">
            <button id="loginBtn" onclick="login()"><span>دخول</span><div class="loader"></div></button>
        </div>
    </div>

    <div id="mainApp" class="section hidden">
        <div class="sidebar">
            <div>مرحباً: <span id="displayName" class="user-tag">..</span></div>
            <div>رصيدك: <b id="displayLimit" style="color:var(--gold);">0</b></div>
        </div>
        <div class="content">
            <label>المعرف (Sender ID):</label>
            <select id="sid">
                <option value="Amgad-sms">Amgad-sms</option>
                <option value="ciedco-sms">ciedco-sms</option>
                <option value="Najm-Rush">Najm-Rush</option>
            </select>
            <textarea id="mno" rows="4" placeholder="9639xxxxxxxx"></textarea>
            <textarea id="msg" rows="3" placeholder="اكتب رسالتك هنا..." oninput="updateSmsLive()"></textarea>
            <div class="sms-info">
                <span>الحروف: <b id="charCount">0</b></span>
                <span>الرسائل/رقم: <b id="segCount">1</b></span>
            </div>
            <button id="sendBtn"><span>إرسال الرسائل الآن</span><div class="loader"></div></button>
            <div id="status" style="font-size:13px;margin-top:15px;text-align:center;color:var(--accent);"></div>
        </div>
    </div>
</div>

<script>
    const API_URL = '/sms-api';
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzWd-CeGoULG8pgK32ZqCYGg9N3p8YxlB6HkEco8KTCr-CAXzrCSmxrp4hjJcMuUss/exec";

    let uLimit, uName, cPhone;

    function getSmsInfo(text) {
        const len = text.length;
        const segs = len <= 70 ? 1 : Math.ceil(len / 67);
        return { chars: len, segs: segs || 1 };
    }

    function updateSmsLive() {
        const info = getSmsInfo(document.getElementById('msg').value);
        document.getElementById('charCount').innerText = info.chars;
        document.getElementById('segCount').innerText = info.segs;
    }

    function setLoading(btnId, state) {
        const btn = document.getElementById(btnId);
        state ? btn.classList.add('is-loading') : btn.classList.remove('is-loading');
        btn.disabled = state;
    }

    async function notify(text) {
        try { fetch(`${API_URL}/notify`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({text}) }); } catch(e){}
    }

    async function login() {
        const p = document.getElementById('loginPhone').value.trim();
        const s = document.getElementById('loginPass').value;
        setLoading('loginBtn', true);
        try {
            const r = await fetch(`${SCRIPT_URL}?phone=${p}&pass=${s}&action=login`);
            const d = await r.json();
            if(d === "Wrong") { alert("خطأ في البيانات"); }
            else {
                cPhone = p; uName = d.name; uLimit = d.limit;
                document.getElementById('displayName').innerText = uName;
                document.getElementById('displayLimit').innerText = uLimit;
                document.getElementById('loginSection').classList.add('hidden');
                document.getElementById('mainApp').classList.remove('hidden');
                notify(`🔓 دخول: ${uName} (${p})`);
            }
        } catch(e) { alert("خطأ اتصال بالجداول"); }
        setLoading('loginBtn', false);
    }

    document.getElementById('sendBtn').onclick = async () => {
        const mnoText = document.getElementById('mno').value;
        const msg = document.getElementById('msg').value;
        const sid = document.getElementById('sid').value;
        const nums = mnoText.split(/\n/).map(l => l.trim()).filter(l => l.length >= 10);
        
        const info = getSmsInfo(msg);
        if(nums.length === 0 || !msg) return alert("أدخل البيانات");

        setLoading('sendBtn', true);
        let sc = 0;
        let report = `🚀 حملة: ${uName}\nنص: ${msg}\n`;

        for(let num of nums) {
            document.getElementById('status').innerText = `جاري المعالجة... (${sc+1}/${nums.length})`;
            
            // 1. الخصم وتحديث الواجهة فوراً (قبل انتظار السيرفر)
            sc++;
            uLimit -= info.segs;
            document.getElementById('displayLimit').innerText = uLimit;
            report += `✅ ${num}\n`;

            try {
                // 2. إرسال الطلب للسيرفر
                fetch(`${API_URL}/send-sms`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ mno: num, msg: msg, sid: sid })
                });

                // 3. تحديث شيت جوجل
                fetch(`${SCRIPT_URL}?phone=${cPhone}&action=update&newLimit=${uLimit}`);
                
            } catch(e) { console.error("فشل تقني بسيط"); }
            
            await new Promise(r => setTimeout(r, 400));
        }

        setLoading('sendBtn', false);
        alert(`اكتملت العملية.\nالناجح: ${sc}\nالخصم: ${sc * info.segs}`);
        notify(report + `\n🏁 المتبقي: ${uLimit}`);
        document.getElementById('status').innerText = "";
    };
</script>
</body>
</html>
