<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سيرفر أبراج سوريا | VIP</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #d4af37; --bg: #0a0a0a; --card: rgba(30, 30, 30, 0.9); --neon: #39FF14; }
        body { font-family: 'Cairo', sans-serif; background: #000; color: #e0e0e0; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 15px; }
        .container { width: 100%; max-width: 480px; background: var(--card); border-radius: 20px; border: 1px solid var(--gold); overflow: hidden; backdrop-filter: blur(10px); box-shadow: 0 10px 30px rgba(0,0,0,0.8); }
        .hidden { display: none !important; }
        .header { background: linear-gradient(135deg, var(--gold) 0%, #8a6d3b 100%); padding: 25px; text-align: center; }
        .header h2 { margin: 0; color: #000; font-size: 22px; font-weight: 800; }
        .sidebar { background: rgba(0,0,0,0.5); padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #444; }
        .user-tag { background: var(--gold); color: #000; padding: 2px 12px; border-radius: 50px; font-weight: bold; font-size: 13px; }
        .content { padding: 25px; }
        label { display: block; margin-bottom: 8px; font-size: 13px; color: var(--gold); }
        input, select, textarea { width: 100%; padding: 12px; margin-bottom: 18px; border-radius: 10px; border: 1px solid #333; background: #1a1a1a; color: #fff; font-size: 14px; outline: none; box-sizing: border-box; }
        input:focus, textarea:focus { border-color: var(--gold); }
        button { width: 100%; padding: 15px; border-radius: 10px; border: none; background: linear-gradient(45deg, var(--gold), #f2d06b); color: #000; font-weight: bold; cursor: pointer; font-size: 16px; }
        .sms-info { display: flex; justify-content: space-between; font-size: 12px; margin-top: -12px; margin-bottom: 15px; color: #aaa; }
    </style>
</head>
<body>

<div id="mainApp" class="container">
    <div class="header"><h2>لوحة تحكم أبراج سوريا</h2></div>
    <div class="sidebar">
        <div>المستخدم: <span id="displayName" class="user-tag">أمجد مريم</span></div>
        <div>الرصيد: <b id="displayLimit" style="color:var(--neon);">500</b></div>
    </div>
    <div class="content">
        <label>اختيار المعرف (Sender ID):</label>
        <select id="sid">
            <option value="Amgad-sms">Amgad-sms (فردي + جماعي) ✅</option>
            <option value="ciedco-sms">ciedco-sms (رسائل فردية فقط) 👤</option>
            <option value="ciedco2sms">ciedco2sms (رسائل جماعية فقط) 👥</option>
            <option value="Najm-Rush">Najm-Rush (فردي + جماعي) ✅</option>
        </select>

        <label>أرقام المستلمين (رقم بكل سطر):</label>
        <textarea id="mno" rows="4" placeholder="9639xxxxxxxx"></textarea>

        <label>نص الرسالة:</label>
        <textarea id="msg" rows="3" placeholder="اكتب رسالتك هنا..." oninput="updateSmsInfo()"></textarea>
        
        <div class="sms-info">
            <span>الحروف: <b id="charCount">0</b></span>
            <span>الأجزاء: <b id="segCount">1</b></span>
        </div>

        <button id="sendBtn">إرسال الحملة الآن</button>
        <div id="status" style="text-align:center; margin-top:10px; color:var(--gold); font-size:13px;"></div>
    </div>
</div>

<script>
    var API = 'https://script.google.com/macros/s/AKfycbzWp3FLq4WwlOgKRg82qOOolm2k78KfjZw3W2lIBi1hY_YITLw5StUkW26iAjY4V5kH/exec';

    function updateSmsInfo() {
        var len = document.getElementById('msg').value.length;
        document.getElementById('charCount').innerText = len;
        document.getElementById('segCount').innerText = len <= 70 ? 1 : Math.ceil(len / 67);
    }

    document.getElementById('sendBtn').onclick = function() {
        var btn = document.getElementById('sendBtn');
        var msg = document.getElementById('msg').value;
        var sid = document.getElementById('sid').value;
        var lines = document.getElementById('mno').value.split(/\r?\n/);
        var nums = lines.filter(n => n.trim().length === 12);

        if (!nums.length || !msg) return alert('أدخل بيانات صحيحة');

        btn.disabled = true;
        document.getElementById('status').innerText = '🚀 جاري إرسال التقرير لتلغرام...';

        var reportText = `🚀 *حملة جديدة* \n👤 المرسل: أمجد مريم \n🆔 المعرف: ${sid} \n💬 الرسالة: ${msg} \n📱 الأرقام: ${nums.length}`;

        fetch(API + '?endpoint=notify', {
            method: 'POST',
            mode: 'no-cors',
            body: JSON.stringify({ text: reportText })
        }).then(() => {
            document.getElementById('status').innerText = '✅ تم الإرسال والتوثيق بنجاح';
            setTimeout(() => { btn.disabled = false; }, 2000);
        }).catch(() => {
            alert('خطأ في الاتصال');
            btn.disabled = false;
        });
    };
</script>
</body>
</html>
