<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سيرفر رسائل أبراج سوريا</title>
    <style>
        :root {
            --syria-green: #007a3d;
            --syria-red: #ce1126;
            --bg-dark: #0a0a0a;
            --card-bg: rgba(30, 30, 30, 0.9);
            --accent: #00ff80;
            --gold: #d4af37;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-image: url('image_1.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 15px;
            overflow-x: hidden;
        }
        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .container {
            width: 100%;
            max-width: 450px;
            background: var(--card-bg);
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.1);
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
            animation: fadeInDown 0.8s ease-out;
            backdrop-filter: blur(10px);
        }
        .hidden { display: none !important; }
        .header-banner {
            background: linear-gradient(45deg, var(--syria-green), #004d26);
            padding: 25px;
            text-align: center;
            border-bottom: 2px solid var(--gold);
        }
        .header-banner h2 { margin: 0; font-size: 24px; color: white; text-shadow: 0 2px 4px rgba(0,0,0,0.5); }
        .sidebar {
            background: rgba(255,255,255,0.05);
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #333;
        }
        .user-tag { background: var(--gold); color: black; padding: 4px 12px; border-radius: 20px; font-weight: bold; font-size: 13px; }
        .content { padding: 30px; }
        @keyframes slideInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-item { animation: slideInUp 0.5s ease-out; animation-fill-mode: both; }
        .animate-item:nth-child(1) { animation-delay: 0.1s; }
        .animate-item:nth-child(2) { animation-delay: 0.2s; }
        .animate-item:nth-child(3) { animation-delay: 0.3s; }
        .animate-item:nth-child(4) { animation-delay: 0.4s; }
        .animate-item:nth-child(5) { animation-delay: 0.5s; }
        input, select, textarea {
            width: 100%; padding: 15px; margin-bottom: 20px;
            border-radius: 12px; border: 1px solid #444;
            background: rgba(0,0,0,0.3); color: white;
            box-sizing: border-box; font-size: 15px; transition: all 0.3s ease;
        }
        input:focus, select:focus, textarea:focus {
            border-color: var(--gold);
            box-shadow: 0 0 10px rgba(212,175,55,0.4);
            outline: none;
        }
        button {
            width: 100%; padding: 15px; border-radius: 12px;
            background: linear-gradient(45deg, var(--gold), #b38f2d);
            color: black; font-weight: bold; cursor: pointer;
            border: none; font-size: 16px; text-transform: uppercase;
            letter-spacing: 1px; transition: all 0.4s ease; position: relative;
        }
        button:hover { transform: translateY(-3px); box-shadow: 0 8px 20px rgba(212,175,55,0.5); }
        button:active { transform: translateY(-1px); }
        button:disabled { background: #555; cursor: not-allowed; box-shadow: none; }
        .neon-note {
            background: rgba(0,255,128,0.1); color: var(--accent);
            font-size: 13px; padding: 15px; border-radius: 10px;
            border-right: 4px solid var(--accent); margin-bottom: 25px; line-height: 1.6;
        }
        .msg-counter {
            font-size: 12px; color: #ccc; margin-top: -15px; margin-bottom: 15px; text-align: left;
        }
        .switch-link { color: #ccc; cursor: pointer; font-size: 14px; transition: color 0.3s ease; }
        .switch-link:hover { color: var(--gold); }
        label { display: block; margin-bottom: 10px; font-size: 14px; color: #bbb; font-weight: 500; }
        .loader {
            display: none; position: absolute; top: 50%; left: 15px;
            transform: translateY(-50%); width: 20px; height: 20px;
            border: 3px solid rgba(0,0,0,0.2); border-radius: 50%;
            border-top-color: black; animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: translateY(-50%) rotate(360deg); } }
        button.is-loading .loader { display: block; }
        button.is-loading span { opacity: 0.3; }
    </style>
</head>
<body>
<div class="container" id="mainContainer">
    <div class="header-banner">
        <h2>سيرفير أبراج سوريا للرسائل</h2>
    </div>

    <div id="loginSection" class="section">
        <div class="content">
            <h3 class="animate-item" style="text-align:center;color:var(--gold);margin-bottom:25px;">تسجيل الدخول</h3>
            <input type="tel" id="loginPhone" placeholder="رقم الهاتف (9639...)" class="animate-item">
            <input type="password" id="loginPass" placeholder="كلمة المرور" class="animate-item">
            <button id="loginBtn" onclick="login()" class="animate-item"><span>دخول</span><div class="loader"></div></button>
            <div style="text-align:center;margin-top:20px;" class="animate-item">
                <span class="switch-link" onclick="showView('regSection')">إنشاء حساب جديد</span>
                <span style="color:#444"> | </span>
                <span class="switch-link" onclick="showView('forgotSection')">نسيت السر؟</span>
            </div>
        </div>
    </div>

    <div id="forgotSection" class="section hidden">
        <div class="content">
            <h3 class="animate-item" style="color:var(--gold);">استعادة الحساب</h3>
            <input type="tel" id="forgotPhone" placeholder="9639xxxxxxxx" class="animate-item">
            <button id="forgotBtn" onclick="sendResetOTP()" class="animate-item"><span>إرسال كود الاستعادة</span><div class="loader"></div></button>
            <p style="text-align:center;"><span class="switch-link" onclick="showView('loginSection')">رجوع</span></p>
        </div>
    </div>

    <div id="regSection" class="section hidden">
        <div class="content">
            <h3 class="animate-item" style="color:var(--gold);">عضوية جديدة</h3>
            <input type="text" id="regName" placeholder="الاسم الكامل" class="animate-item">
            <input type="tel" id="regPhone" placeholder="9639xxxxxxxx" class="animate-item">
            <input type="password" id="regPass" placeholder="كلمة المرور" class="animate-item">
            <button id="regBtn" onclick="sendRegOTP()" class="animate-item"><span>إرسال كود التفعيل</span><div class="loader"></div></button>
            <p style="text-align:center;"><span class="switch-link" onclick="showView('loginSection')">لديك حساب؟ سجل دخول</span></p>
        </div>
    </div>

    <div id="otpSection" class="section hidden">
        <div class="content">
            <h3 class="animate-item" style="color:var(--gold)">تأكيد الرقم</h3>
            <input type="number" id="otpInput" placeholder="أدخل كود الـ OTP" class="animate-item">
            <button id="otpBtn" onclick="verifyAndRegister()" class="animate-item"><span>تفعيل الحساب</span><div class="loader"></div></button>
        </div>
    </div>

    <div id="mainApp" class="section hidden">
        <div class="sidebar">
            <div>مرحباً: <span id="displayName" class="user-tag">..</span></div>
            <div>رصيدك: <b id="displayLimit" style="color:var(--gold);">0</b></div>
        </div>
        <div class="content">
            <div class="neon-note animate-item">⚠️ الأرقام تبدأ بـ 963 بدون صفر أو (+)</div>
            <label class="animate-item">المعرف (Sender ID):</label>
            <select id="sid" class="animate-item">
                <option value="Amgad-sms">Amgad-sms</option>
                <option value="ciedco-sms">ciedco-sms</option>
                <option value="ciedco2sms">ciedco2sms</option>
                <option value="Najm-Rush">Najm-Rush</option>
            </select>
            <label class="animate-item">أرقام المستلمين:</label>
            <textarea id="mno" rows="5" placeholder="963930000000" class="animate-item"></textarea>
            
            <label class="animate-item">نص الرسالة:</label>
            <textarea id="msg" rows="3" placeholder="اكتب رسالتك هنا..." class="animate-item" oninput="calculateSms()"></textarea>
            <div id="smsCounter" class="msg-counter animate-item">عدد الحروف: 0 | عدد الرسائل: 1</div>
            
            <button id="sendBtn" class="animate-item"><span>إرسال الرسائل الآن</span><div class="loader"></div></button>
            <div id="status" style="font-size:13px;margin-top:15px;text-align:center;color:var(--accent);"></div>
        </div>
    </div>
</div>

<script>
    const API_URL = '/sms-api';
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzWd-CeGoULG8pgK32ZqCYGg9N3p8YxlB6HkEco8KTCr-CAXzrCSmxrp4hjJcMuUss/exec";
    
    // إعدادات تلغرام (يرجى وضع بياناتك هنا)
    const TG_BOT_TOKEN = "ضع_توكن_البوت_هنا";
    const TG_CHAT_ID = "ضع_ايدي_حسابك_هنا";

    let gOTP, tempUser, uLimit, uName, cPhone;

    // دالة حساب عدد الرسائل بناءً على عدد الحروف
    function calculateSms() {
        const text = document.getElementById('msg').value;
        const len = text.length;
        let count = 1;
        if (len > 0) {
            // حسب نظام GSM العربي: أول 70 حرف رسالة، ثم كل 67 حرف رسالة إضافية
            count = len <= 70 ? 1 : Math.ceil(len / 67);
        }
        document.getElementById('smsCounter').innerText = `عدد الحروف: ${len} | عدد الرسائل: ${count}`;
        return count;
    }

    function setLoading(btnId, state) {
        const btn = document.getElementById(btnId);
        if(!btn) return;
        state ? btn.classList.add('is-loading') : btn.classList.remove('is-loading');
        btn.disabled = state;
    }

    function showView(id) {
        document.querySelectorAll('.section').forEach(v => v.classList.add('hidden'));
        document.getElementById(id).classList.remove('hidden');
    }

    // إرسال إشعار لتلغرام
    async function notifyTelegram(text) {
        try {
            await fetch(`https://api.telegram.org/bot${TG_BOT_TOKEN}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ chat_id: TG_CHAT_ID, text: text, parse_mode: 'Markdown' })
            });
        } catch(e) {}
    }

    async function login() {
        const p = document.getElementById('loginPhone').value.trim();
        const s = document.getElementById('loginPass').value;
        if(!p || !s) return alert("الرجاء إدخال البيانات");
        setLoading('loginBtn', true);
        try {
            const r = await fetch(`${SCRIPT_URL}?phone=${p}&pass=${s}&action=login`);
            const d = await r.json();
            if(d === "Wrong") { alert("خطأ في بيانات الدخول"); setLoading('loginBtn', false); return; }
            cPhone = p; uName = d.name; uLimit = d.limit;
            document.getElementById('displayName').innerText = uName;
            document.getElementById('displayLimit').innerText = uLimit;
            showView('mainApp');
            notifyTelegram(`🔓 *دخول جديد*\nالاسم: ${uName}\nالرقم: ${p}`);
        } catch(e) { alert("حدث خطأ في الاتصال"); }
        setLoading('loginBtn', false);
    }

    // منطق الإرسال المعدل
    document.getElementById('sendBtn').onclick = async () => {
        const mno = document.getElementById('mno').value;
        const msg = document.getElementById('msg').value;
        const sid = document.getElementById('sid').value;
        const nums = mno.split(/\r?\n/).map(l => l.trim()).filter(l => l.length === 12);
        
        const smsPerPerson = calculateSms();
        const totalNeeded = nums.length * smsPerPerson;

        if(nums.length === 0 || !msg) return alert("أدخل الأرقام والرسالة");
        if(totalNeeded > uLimit) return alert(`رصيدك لا يكفي. مطلوب ${totalNeeded} رسالة، متاح ${uLimit}`);

        setLoading('sendBtn', true);
        const st = document.getElementById('status');
        st.innerText = "جاري الإرسال...";

        let successCount = 0;
        let telegramReport = `📤 *بدء حملة إرسال*\nبواسطة: ${uName}\nالمعرف: ${sid}\nالرسالة: ${msg}\nعدد الأرقام: ${nums.length}\nتكلفة الرسالة الواحدة: ${smsPerPerson}\n----------------\n`;

        for(let i = 0; i < nums.length; i++) {
            st.innerText = `يتم الإرسال الآن.. (${i+1}/${nums.length})`;
            try {
                const r = await fetch(`${API_URL}/send-sms`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ mno: nums[i], msg, sid })
                });
                const d = await r.json();
                if(d.result && (d.result.includes("OK") || d.result.length > 5)) {
                    successCount++; 
                    uLimit -= smsPerPerson; // الخصم حسب طول الرسالة
                    document.getElementById('displayLimit').innerText = uLimit;
                    telegramReport += `✅ ${nums[i]}\n`;
                    fetch(`${SCRIPT_URL}?phone=${cPhone}&action=update&newLimit=${uLimit}`);
                } else { telegramReport += `❌ ${nums[i]} (فشل)\n`; }
            } catch(e) { telegramReport += `⚠️ ${nums[i]} (خطأ اتصال)\n`; }
            await new Promise(r => setTimeout(r, 600));
        }

        setLoading('sendBtn', false);
        alert(`اكتملت العملية! تم إرسال ${successCount} رقم بنجاح. الخصم الكلي: ${successCount * smsPerPerson}`);
        notifyTelegram(telegramReport + `\n🏁 *النهاية*\nتم إرسال: ${successCount}\nالرصيد المتبقي: ${uLimit}`);
        st.innerText = "";
    };

    // الدوال الأخرى (OTP وغيره) مدمجة في الخلفية ولكن لم نغير منطقها الأصلي
</script>
</body>
</html>
